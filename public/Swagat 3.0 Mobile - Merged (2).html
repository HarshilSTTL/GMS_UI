window.Icon = function Icon({ name, size = 18, color = 'currentColor', strokeWidth = 2, style, className }) {
  const path = window.LUCIDE_ICONS[name];
  if (!path) return <span style={{ display: 'inline-block', width: size, height: size, ...style }} className={className}></span>;
  // multi-path: split by " M" and rejoin
  const segments = path.split(/(?=M)/g).filter(p => p.trim());
  return (
    <svg
      width={size}
      height={size}
      viewBox="0 0 24 24"
      fill="none"
      stroke={color}
      strokeWidth={strokeWidth}
      strokeLinecap="round"
      strokeLinejoin="round"
      style={{ display: 'inline-block', verticalAlign: 'middle', flexShrink: 0, ...style }}
      className={className}
    >
      {segments.map((d, i) => <path key={i} d={d.trim()} />)}
    </svg>
  );
};

<script type="text/babel">
// Android.jsx — Simplified Android (Material 3) device frame
// Status bar + top app bar + content + gesture nav + keyboard.
// Based on Figma M3 spec. No dependencies, no image assets.

const MD_C = {
  surface: '#f4fbf8',
  surfaceVariant: '#dae5e1',
  inverseOnSurface: '#ecf2ef',
  secondaryContainer: '#cde8e1',
  primaryFixedDim: '#83d5c6',
  onSurface: '#171d1b',
  onSurfaceVar: '#49454f',
  onPrimaryContainer: '#00201c',
  primary: '#006a60',
  frameBorder: 'rgba(116,119,117,0.5)',
};

// ─────────────────────────────────────────────────────────────
// Status bar (time left, wifi/cell/battery right)
// ─────────────────────────────────────────────────────────────
function AndroidStatusBar({ dark = false }) {
  const c = dark ? '#fff' : MD_C.onSurface;
  return (
    <div style={{
      height: 40, display: 'flex', alignItems: 'center',
      justifyContent: 'space-between', padding: '0 16px',
      position: 'relative',
      fontFamily: 'Roboto, system-ui, sans-serif',
    }}>
      {/* time left */}
      <div style={{ width: 128, display: 'flex', alignItems: 'center', gap: 8 }}>
        <span style={{ fontSize: 14, fontWeight: 400, letterSpacing: 0.25, lineHeight: '20px', color: c }}>9:30</span>
      </div>
      {/* camera punch-hole (center) */}
      <div style={{
        position: 'absolute', left: '50%', top: 8, transform: 'translateX(-50%)',
        width: 24, height: 24, borderRadius: 100, background: '#2e2e2e',
      }} />
      {/* status icons right */}
      <div style={{ display: 'flex', alignItems: 'center' }}>
        <div style={{ display: 'flex', paddingRight: 2 }}>
          <svg width="16" height="16" viewBox="0 0 16 16" style={{ marginRight: -2 }}>
            <path d="M8 13.3L.67 5.97a10.37 10.37 0 0114.66 0L8 13.3z" fill={c}/>
          </svg>
          <svg width="16" height="16" viewBox="0 0 16 16" style={{ marginRight: -2 }}>
            <path d="M14.67 14.67V1.33L1.33 14.67h13.34z" fill={c}/>
          </svg>
        </div>
        <svg width="16" height="16" viewBox="0 0 16 16">
          <rect x="3.75" y="2" width="8.5" height="13" rx="1.5" fill={c}/>
          <rect x="5.5" y="0.9" width="5" height="2" rx="0.5" fill={c}/>
        </svg>
      </div>
    </div>
  );
}

// ─────────────────────────────────────────────────────────────
// Top app bar (Material 3 small/medium)
// ─────────────────────────────────────────────────────────────
function AndroidAppBar({ title = 'Title', large = false }) {
  const iconDot = (
    <div style={{
      width: 48, height: 48, display: 'flex', alignItems: 'center', justifyContent: 'center',
    }}>
      <div style={{ width: 22, height: 22, borderRadius: '50%', background: MD_C.onSurfaceVar, opacity: 0.3 }} />
    </div>
  );
  return (
    <div style={{ background: MD_C.surface, padding: '4px 4px 0' }}>
      <div style={{ height: 56, display: 'flex', alignItems: 'center', gap: 4 }}>
        {iconDot}
        {!large && (
          <span style={{
            flex: 1, fontSize: 22, fontWeight: 400, color: MD_C.onSurface,
            fontFamily: 'Roboto, system-ui, sans-serif',
          }}>{title}</span>
        )}
        {large && <div style={{ flex: 1 }} />}
        {iconDot}
      </div>
      {large && (
        <div style={{
          padding: '16px 16px 20px',
          fontSize: 28, fontWeight: 400, color: MD_C.onSurface,
          fontFamily: 'Roboto, system-ui, sans-serif',
        }}>{title}</div>
      )}
    </div>
  );
}

// ─────────────────────────────────────────────────────────────
// List item (Material 3)
// ─────────────────────────────────────────────────────────────
function AndroidListItem({ headline, supporting, leading }) {
  return (
    <div style={{
      display: 'flex', alignItems: 'center', gap: 16,
      padding: '12px 16px', minHeight: 56, boxSizing: 'border-box',
      fontFamily: 'Roboto, system-ui, sans-serif',
    }}>
      {leading && (
        <div style={{
          width: 40, height: 40, borderRadius: '50%',
          background: MD_C.primary, color: '#fff',
          display: 'flex', alignItems: 'center', justifyContent: 'center',
          fontSize: 18, fontWeight: 500, flexShrink: 0,
        }}>{leading}</div>
      )}
      <div style={{ flex: 1, minWidth: 0 }}>
        <div style={{ fontSize: 16, color: MD_C.onSurface, lineHeight: '24px' }}>{headline}</div>
        {supporting && (
          <div style={{ fontSize: 14, color: MD_C.onSurfaceVar, lineHeight: '20px' }}>{supporting}</div>
        )}
      </div>
    </div>
  );
}

// ─────────────────────────────────────────────────────────────
// Gesture nav bar (pill)
// ─────────────────────────────────────────────────────────────
function AndroidNavBar({ dark = false }) {
  return (
    <div style={{
      height: 24, display: 'flex', alignItems: 'center', justifyContent: 'center',
    }}>
      <div style={{
        width: 108, height: 4, borderRadius: 2,
        background: dark ? '#fff' : MD_C.onSurface, opacity: 0.4,
      }} />
    </div>
  );
}

// ─────────────────────────────────────────────────────────────
// Device frame — wraps everything
// ─────────────────────────────────────────────────────────────
function AndroidDevice({
  children, width = 412, height = 892, dark = false,
  title, large = false, keyboard = false,
}) {
  return (
    <div style={{
      width, height, borderRadius: 18, overflow: 'hidden',
      background: dark ? '#1d1b20' : MD_C.surface,
      border: `8px solid ${MD_C.frameBorder}`,
      boxShadow: '0 30px 80px rgba(0,0,0,0.25)',
      display: 'flex', flexDirection: 'column', boxSizing: 'border-box',
    }}>
      <AndroidStatusBar dark={dark} />
      {title !== undefined && <AndroidAppBar title={title} large={large} />}
      <div style={{ flex: 1, overflow: 'auto' }}>
        {children}
      </div>
      {keyboard && <AndroidKeyboard />}
      <AndroidNavBar dark={dark} />
    </div>
  );
}

// ─────────────────────────────────────────────────────────────
// Keyboard — Gboard (Material 3)
// ─────────────────────────────────────────────────────────────
function AndroidKeyboard() {
  let _k = 0;
  const key = (l, { flex = 1, bg = MD_C.surface, r = 6, minW, fs = 21 } = {}) => (
    <div key={_k++} style={{
      height: 46, borderRadius: r, flex, minWidth: minW,
      background: bg, display: 'flex', alignItems: 'center', justifyContent: 'center',
      fontFamily: 'Roboto, system-ui', fontSize: fs,
      color: MD_C.onPrimaryContainer,
    }}>{l}</div>
  );
  const row = (keys, style = {}) => (
    <div style={{ display: 'flex', gap: 6, justifyContent: 'center', ...style }}>
      {keys.map(l => key(l))}
    </div>
  );
  return (
    <div style={{
      background: MD_C.inverseOnSurface, padding: '0 8px 8px',
      display: 'flex', flexDirection: 'column', gap: 4,
    }}>
      {/* navbar spacer (icons omitted) */}
      <div style={{ height: 44 }} />
      {/* key rows */}
      <div style={{ display: 'flex', flexDirection: 'column', gap: 12 }}>
        {row(['q','w','e','r','t','y','u','i','o','p'])}
        {row(['a','s','d','f','g','h','j','k','l'], { padding: '0 20px' })}
        <div style={{ display: 'flex', gap: 6 }}>
          {key('', { bg: MD_C.surfaceVariant })}
          <div style={{ display: 'flex', gap: 6, flex: 7, minWidth: 274 }}>
            {['z','x','c','v','b','n','m'].map(l => key(l))}
          </div>
          {key('', { bg: MD_C.surfaceVariant })}
        </div>
        <div style={{ display: 'flex', gap: 6 }}>
          {key('?123', { bg: MD_C.secondaryContainer, r: 100, minW: 58, fs: 14 })}
          {key(',', { bg: MD_C.surfaceVariant })}
          {key('', { flex: 3, minW: 154 })}
          {key('.', { bg: MD_C.surfaceVariant })}
          {key('', { bg: MD_C.primaryFixedDim, r: 100, minW: 58 })}
        </div>
      </div>
    </div>
  );
}

Object.assign(window, {
  AndroidDevice, AndroidStatusBar, AndroidAppBar, AndroidListItem, AndroidNavBar, AndroidKeyboard,
});
</script>

// ── useTweaks ───────────────────────────────────────────────────────────────
// Single source of truth for tweak values. setTweak persists via the host
// (__edit_mode_set_keys → host rewrites the EDITMODE block on disk).
function useTweaks(defaults) {
  const [values, setValues] = React.useState(defaults);
  // Accepts either setTweak('key', value) or setTweak({ key: value, ... }) so a
  // useState-style call doesn't write a "[object Object]" key into the persisted
  // JSON block.
  const setTweak = React.useCallback((keyOrEdits, val) => {
    const edits = typeof keyOrEdits === 'object' && keyOrEdits !== null
      ? keyOrEdits : { [keyOrEdits]: val };
    setValues((prev) => ({ ...prev, ...edits }));
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits }, '*');
  }, []);
  return [values, setTweak];
}

// ── TweaksPanel ─────────────────────────────────────────────────────────────
// Floating shell. Registers the protocol listener BEFORE announcing
// availability — if the announce ran first, the host's activate could land
// before our handler exists and the toolbar toggle would silently no-op.
// The close button posts __edit_mode_dismissed so the host's toolbar toggle
// flips off in lockstep; the host echoes __deactivate_edit_mode back which
// is what actually hides the panel.
function TweaksPanel({ title = 'Tweaks', children }) {
  const [open, setOpen] = React.useState(false);
  const dragRef = React.useRef(null);
  const offsetRef = React.useRef({ x: 16, y: 16 });
  const PAD = 16;

  const clampToViewport = React.useCallback(() => {
    const panel = dragRef.current;
    if (!panel) return;
    const w = panel.offsetWidth, h = panel.offsetHeight;
    const maxRight = Math.max(PAD, window.innerWidth - w - PAD);
    const maxBottom = Math.max(PAD, window.innerHeight - h - PAD);
    offsetRef.current = {
      x: Math.min(maxRight, Math.max(PAD, offsetRef.current.x)),
      y: Math.min(maxBottom, Math.max(PAD, offsetRef.current.y)),
    };
    panel.style.right = offsetRef.current.x + 'px';
    panel.style.bottom = offsetRef.current.y + 'px';
  }, []);

  React.useEffect(() => {
    if (!open) return;
    clampToViewport();
    if (typeof ResizeObserver === 'undefined') {
      window.addEventListener('resize', clampToViewport);
      return () => window.removeEventListener('resize', clampToViewport);
    }
    const ro = new ResizeObserver(clampToViewport);
    ro.observe(document.documentElement);
    return () => ro.disconnect();
  }, [open, clampToViewport]);

  React.useEffect(() => {
    const onMsg = (e) => {
      const t = e?.data?.type;
      if (t === '__activate_edit_mode') setOpen(true);
      else if (t === '__deactivate_edit_mode') setOpen(false);
    };
    window.addEventListener('message', onMsg);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', onMsg);
  }, []);

  const dismiss = () => {
    setOpen(false);
    window.parent.postMessage({ type: '__edit_mode_dismissed' }, '*');
  };

  const onDragStart = (e) => {
    const panel = dragRef.current;
    if (!panel) return;
    const r = panel.getBoundingClientRect();
    const sx = e.clientX, sy = e.clientY;
    const startRight = window.innerWidth - r.right;
    const startBottom = window.innerHeight - r.bottom;
    const move = (ev) => {
      offsetRef.current = {
        x: startRight - (ev.clientX - sx),
        y: startBottom - (ev.clientY - sy),
      };
      clampToViewport();
    };
    const up = () => {
      window.removeEventListener('mousemove', move);
      window.removeEventListener('mouseup', up);
    };
    window.addEventListener('mousemove', move);
    window.addEventListener('mouseup', up);
  };

  if (!open) return null;
  return (
    <>
      <style>{__TWEAKS_STYLE}</style>
      <div ref={dragRef} className="twk-panel" data-noncommentable=""
           style={{ right: offsetRef.current.x, bottom: offsetRef.current.y }}>
        <div className="twk-hd" onMouseDown={onDragStart}>
          <b>{title}</b>
          <button className="twk-x" aria-label="Close tweaks"
                  onMouseDown={(e) => e.stopPropagation()}
                  onClick={dismiss}>✕</button>
        </div>
        <div className="twk-body">{children}</div>
      </div>
    </>
  );
}

// ── Layout helpers ──────────────────────────────────────────────────────────

function TweakSection({ label, children }) {
  return (
    <>
      <div className="twk-sect">{label}</div>
      {children}

  );
}

function TweakRow({ label, value, children, inline = false }) {
  return (
    <div className={inline ? 'twk-row twk-row-h' : 'twk-row'}>
      <div className="twk-lbl">
        <span>{label}</span>
        {value != null && <span className="twk-val">{value}</span>}
      </div>
      {children}
    </div>
  );
}

// ── Controls ────────────────────────────────────────────────────────────────

function TweakSlider({ label, value, min = 0, max = 100, step = 1, unit = '', onChange }) {
  return (
    <TweakRow label={label} value={`${value}${unit}`}>
      <input type="range" className="twk-slider" min={min} max={max} step={step}
             value={value} onChange={(e) => onChange(Number(e.target.value))} />
    </TweakRow>
  );
}

function TweakToggle({ label, value, onChange }) {
  return (
    <div className="twk-row twk-row-h">
      <div className="twk-lbl"><span>{label}</span></div>
      <button type="button" className="twk-toggle" data-on={value ? '1' : '0'}
              role="switch" aria-checked={!!value}
              onClick={() => onChange(!value)}><i /></button>
    </div>
  );
}

function TweakRadio({ label, value, options, onChange }) {
  const trackRef = React.useRef(null);
  const [dragging, setDragging] = React.useState(false);
  const opts = options.map((o) => (typeof o === 'object' ? o : { value: o, label: o }));
  const idx = Math.max(0, opts.findIndex((o) => o.value === value));
  const n = opts.length;

  // The active value is read by pointer-move handlers attached for the lifetime
  // of a drag — ref it so a stale closure doesn't fire onChange for every move.
  const valueRef = React.useRef(value);
  valueRef.current = value;

  const segAt = (clientX) => {
    const r = trackRef.current.getBoundingClientRect();
    const inner = r.width - 4;
    const i = Math.floor(((clientX - r.left - 2) / inner) * n);
    return opts[Math.max(0, Math.min(n - 1, i))].value;
  };

  const onPointerDown = (e) => {
    setDragging(true);
    const v0 = segAt(e.clientX);
    if (v0 !== valueRef.current) onChange(v0);
    const move = (ev) => {
      if (!trackRef.current) return;
      const v = segAt(ev.clientX);
      if (v !== valueRef.current) onChange(v);
    };
    const up = () => {
      setDragging(false);
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };

  return (
    <TweakRow label={label}>
      <div ref={trackRef} role="radiogroup" onPointerDown={onPointerDown}
           className={dragging ? 'twk-seg dragging' : 'twk-seg'}>
        <div className="twk-seg-thumb"
             style={{ left: `calc(2px + ${idx} * (100% - 4px) / ${n})`,
                      width: `calc((100% - 4px) / ${n})` }} />
        {opts.map((o) => (
          <button key={o.value} type="button" role="radio" aria-checked={o.value === value}>
            {o.label}
          </button>
        ))}
      </div>
    </TweakRow>
  );
}

function TweakSelect({ label, value, options, onChange }) {
  return (
    <TweakRow label={label}>
      <select className="twk-field" value={value} onChange={(e) => onChange(e.target.value)}>
        {options.map((o) => {
          const v = typeof o === 'object' ? o.value : o;
          const l = typeof o === 'object' ? o.label : o;
          return <option key={v} value={v}>{l}</option>;
        })}
      </select>
    </TweakRow>
  );
}

function TweakText({ label, value, placeholder, onChange }) {
  return (
    <TweakRow label={label}>
      <input className="twk-field" type="text" value={value} placeholder={placeholder}
             onChange={(e) => onChange(e.target.value)} />
    </TweakRow>
  );
}

function TweakNumber({ label, value, min, max, step = 1, unit = '', onChange }) {
  const clamp = (n) => {
    if (min != null && n < min) return min;
    if (max != null && n > max) return max;
    return n;
  };
  const startRef = React.useRef({ x: 0, val: 0 });
  const onScrubStart = (e) => {
    e.preventDefault();
    startRef.current = { x: e.clientX, val: value };
    const decimals = (String(step).split('.')[1] || '').length;
    const move = (ev) => {
      const dx = ev.clientX - startRef.current.x;
      const raw = startRef.current.val + dx * step;
      const snapped = Math.round(raw / step) * step;
      onChange(clamp(Number(snapped.toFixed(decimals))));
    };
    const up = () => {
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };
  return (
    <div className="twk-num">
      <span className="twk-num-lbl" onPointerDown={onScrubStart}>{label}</span>
      <input type="number" value={value} min={min} max={max} step={step}
             onChange={(e) => onChange(clamp(Number(e.target.value)))} />
      {unit && <span className="twk-num-unit">{unit}</span>}
    </div>
  );
}

function TweakColor({ label, value, onChange }) {
  return (
    <div className="twk-row twk-row-h">
      <div className="twk-lbl"><span>{label}</span></div>
      <input type="color" className="twk-swatch" value={value}
             onChange={(e) => onChange(e.target.value)} />
    </div>
  );
}

function TweakButton({ label, onClick, secondary = false }) {
  return (
    <button type="button" className={secondary ? 'twk-btn secondary' : 'twk-btn'}
            onClick={onClick}>{label}</button>
  );
}

Object.assign(window, {
  useTweaks, TweaksPanel, TweakSection, TweakRow,
  TweakSlider, TweakToggle, TweakRadio, TweakSelect,
  TweakText, TweakNumber, TweakColor, TweakButton,
});
</script>

function Btn({ label, onClick, variant = 'primary', disabled, full, size = 'md', style: extStyle }) {

    primary: { background: `linear-gradient(135deg, ${C.navy}, ${C.navyLight})`, color: C.white, boxShadow: '0 4px 12px rgba(26,50,96,0.3)' },

  return (

function Input({ label, value, onChange, placeholder, type = 'text', maxLength, helper }) {

function Modal({ open, onClose, title, children }) {
  if (!open) return null;
  return (
    <div style={{ position: 'absolute', inset: 0, background: 'rgba(0,0,0,0.5)', zIndex: 200, display: 'flex', alignItems: 'flex-end' }}>

function Toast({ message, visible }) {

      zIndex: 300, textAlign: 'center',

    }}>{message}</div>
  );
}

function VoiceBtn({ label }) {
  const [recording, setRecording] = useState(false);
  return (

      onMouseDown={() => setRecording(true)} onMouseUp={() => setRecording(false)}

      style={{
        display: 'flex', alignItems: 'center', gap: 8,

        color: recording ? C.white : C.gray600,
        border: 'none', borderRadius: 12, padding: '10px 16px',

      }}>
      <span style={{ fontSize: 18 }}>{recording ? '⏹' : '🎤'}</span>
      {recording ? 'Recording…' : label}
    </button>
  );
}

/* ── OTP ─────────────────────────────────────────────── */
function OTPScreen({ mobile, onVerify, onBack, lang }) {
  const [otp, setOtp] = useState(['','','','','','']);
  const [loading, setLoading] = useState(false);
  const [timer, setTimer] = useState(30);
  const refs = [useRef(),useRef(),useRef(),useRef(),useRef(),useRef()];
  const s = S(lang);

  useEffect(() => { if (timer > 0) { const t = setTimeout(() => setTimer(v=>v-1), 1000); return () => clearTimeout(t); }}, [timer]);

  const handleChange = (val, i) => {
    if (!/^\d?$/.test(val)) return;
    const next = [...otp]; next[i] = val;
    setOtp(next);
    if (val && i < 5) refs[i+1].current?.focus();
  };
  const handleKey = (e, i) => { if (e.key === 'Backspace' && !otp[i] && i > 0) refs[i-1].current?.focus(); };

  const handleVerify = () => {
    setLoading(true);
    setTimeout(() => { setLoading(false); onVerify(); }, 1400);
  };
  const full = otp.every(d => d !== '');

  return (
    <div style={{ height: '100%', display: 'flex', flexDirection: 'column', background: C.gray50 }}>
      <TopBar title={s.otpLabel} onBack={onBack} lang={lang} />
      <div style={{ flex: 1, padding: 24, display: 'flex', flexDirection: 'column' }}>
        <div style={{ background: C.white, borderRadius: 20, padding: 24, boxShadow: '0 4px 20px rgba(0,0,0,0.08)' }}>
          <div style={{ fontSize: 40, textAlign: 'center', marginBottom: 12 }}><Icon name="phone" size={16} /></div>
          <div style={{ fontWeight: 700, fontSize: 18, color: C.gray800, textAlign: 'center', marginBottom: 6 }}>{lang === 'gu' ? 'OTP દાખલ કરો' : 'Verify OTP'}</div>
          <div style={{ fontSize: 13, color: C.gray400, textAlign: 'center', marginBottom: 28 }}>{s.otpSent} <strong>{mobile}</strong></div>
          <div style={{ display: 'flex', gap: 8, justifyContent: 'center', marginBottom: 24 }}>
            {otp.map((d, i) => (
              <input key={i} ref={refs[i]} value={d} onChange={e => handleChange(e.target.value, i)} onKeyDown={e => handleKey(e, i)}
                maxLength={1} type="tel" style={{
                  width: 44, height: 52, borderRadius: 12, textAlign: 'center', fontSize: 22, fontWeight: 700,
                  border: `2px solid ${d ? C.navy : C.gray200}`, outline: 'none', fontFamily: 'inherit', color: C.gray800,
                }}
              />
            ))}
          </div>
          <Btn label={loading ? '⏳ Verifying…' : s.verifyOtp} onClick={handleVerify} variant="primary" full disabled={loading || !full} />
          <div style={{ textAlign: 'center', marginTop: 16, fontSize: 13, color: C.gray400 }}>
            {timer > 0 ? `Resend in ${timer}s` : <button onClick={() => setTimer(30)} style={{ background: 'none', border: 'none', color: C.navy, cursor: 'pointer', fontWeight: 600, fontFamily: 'inherit', fontSize: 13 }}>{s.resendOtp}</button>}
          </div>
          <div style={{ marginTop: 20, padding: '10px 14px', background: C.greenLight, borderRadius: 10, fontSize: 12, color: C.green, fontWeight: 500 }}>
            🔒 Demo OTP: <strong>123456</strong> (any digits work in this prototype)
          </div>
        </div>
      </div>
    </div>
  );
}

        [T.track]: { text: '🔍 તમારો ગ્રીવન્સ ID દાખલ કરો (દા.ત. GJ-2026-0901) અથવા તાજેતરની ફરિયાદો જુઓ.', options: ['GJ-2026-0901', 'GJ-2026-0847', 'બધી ફરિયાદ બતાવો'] },
        [T.sla]: { text: '⏱️ SLA વિહંગાવલોકન (HFWD ગુજરાત):\n\n🔴 ગંભીર: તે જ દિવસ (108, ડિલિવરી)\n🟡 ઊંચી: 7 દિવસ (ANC, PHC)\n🟢 મધ્યમ: 10 દિવસ (કુટુંબ આયોજન)', options: [T.file, T.track] },

<script type="text/babel">// Swagat 3.0 — AI Screens & Registration

const C2 = window.GMS.COLORS;

            <Input label="Full Name" value={data.fullName} onChange={v => set('fullName', v)} placeholder="e.g. Ramesh Patel" />

                      flex: 1, padding: '11px', borderRadius: 12,

            <Input label="Email (Optional)" value={data.email} onChange={v => set('email', v)} placeholder="ramesh@example.com" type="email" />
          </div>

        {step === 2 && (
          <div>
            <div style={{ fontSize: 18, fontWeight: 700, color: C2.gray800, marginBottom: 18 }}><Icon name="pin" size={14} /> Address Details</div>
            <div style={{ marginBottom: 16 }}>
              <div style={{ fontSize: 12, fontWeight: 600, color: C2.gray600, marginBottom: 6 }}>District</div>
              <select value={data.district} onChange={e => set('district', e.target.value)} style={{ width: '100%', padding: '13px 14px', borderRadius: 12, border: `2px solid ${C2.gray200}`, fontSize: 14, fontFamily: 'inherit', background: C2.white, color: C2.gray800, outline: 'none' }}>

/* ── AI WRITER PANEL (used inside Step 3 description) ─── */
function AIWriterPanel({ category, lang, onApply, onClose }) {

    setGenerating(true);
    setTimeout(() => {
      setEditing(tmpl + '\n\n🤖 Tip: Mention exact date, name of staff, and what was denied for stronger resolution.');

    }, 1100);
  };
  return (
    <div style={{ background: 'linear-gradient(135deg, #EDE9FE, #FFF3E8)', borderRadius: 14, padding: '14px 16px', marginBottom: 14, border: `1.5px solid ${C2.purple}` }}>

        <button onClick={regen} disabled={generating} style={{ flex: 1, padding: '8px', borderRadius: 10, background: C2.white, border: `1.5px solid ${C2.purple}`, color: C2.purple, fontSize: 12, fontWeight: 700, cursor: 'pointer', fontFamily: 'inherit' }}>{generating ? '⏳ Generating...' : '🔄 Regenerate'}</button>
        <button onClick={() => onApply(editing)} style={{ flex: 1, padding: '8px', borderRadius: 10, background: C2.purple, border: 'none', color: C2.white, fontSize: 12, fontWeight: 700, cursor: 'pointer', fontFamily: 'inherit' }}><Icon name="check" size={14} /> Use This Draft</button>
      </div>
    </div>
  );
}

/* ── DEDUP DETECTION (shown after typing) ────────────── */
function DedupBanner({ description, onSelect, lang }) {
  const text = description.toLowerCase();
  const detection = window.GMS.SIMILAR_DETECTION;
  const matched = detection.keywords.some(k => text.includes(k));
  if (!matched || description.length < 15) return null;
  return (

<script type="text/babel">// Swagat 3.0 — Enhanced Submit Form (mobile + web)
const { useState, useEffect, useRef } = React;
const CC = window.GMS.COLORS;

/* ── VOICE INPUT BUTTON (real Web Speech API + fallback) ── */
function VoiceMic({ onResult, lang }) {
  const [recording, setRecording] = useState(false);
  const [supported, setSupported] = useState(true);
  const recogRef = useRef(null);

  const langMap = { en: 'en-IN', gu: 'gu-IN', hi: 'hi-IN' };

  useEffect(() => {
    const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (!SR) { setSupported(false); return; }
  }, []);

  const start = () => {
    const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (!SR) {
      // Simulated transcript for demo when API unavailable
      setRecording(true);
      setTimeout(() => {
        onResult(lang === 'gu'
          ? 'PHC નારણપુરા ખાતે JSSK હેઠળ મફત દવા આપવાનો ઇનકાર કરવામાં આવ્યો. તારીખ ૨૫ એપ્રિલ ૨૦૨૬.'
          : 'Free medicines under JSSK scheme were denied at PHC Naranpura on April 25, 2026. The pharmacist asked for payment despite eligibility.');
        setRecording(false);
      }, 2400);
      return;
    }
    const r = new SR();
    r.lang = langMap[lang] || 'en-IN';
    r.interimResults = true;
    r.continuous = false;
    r.onresult = (e) => {
      const txt = Array.from(e.results).map(res => res[0].transcript).join(' ');
      onResult(txt);
    };
    r.onend = () => setRecording(false);
    r.onerror = () => setRecording(false);
    recogRef.current = r;
    r.start();
    setRecording(true);
  };

  const stop = () => {
    if (recogRef.current) recogRef.current.stop();
    setRecording(false);
  };

  return (
    <button onClick={recording ? stop : start} type="button" style={{
      display: 'flex', alignItems: 'center', gap: 8, padding: '10px 14px',
      borderRadius: 10, border: `1.5px solid ${recording ? CC.red : CC.purple}`,
      background: recording ? CC.redLight : CC.purpleLight,
      color: recording ? CC.red : CC.purple,
      cursor: 'pointer', fontFamily: 'inherit', fontSize: 12, fontWeight: 700,
      width: '100%', justifyContent: 'center'
    }}>
      <span style={{ fontSize: 16, animation: recording ? 'pulse 1s infinite' : 'none' }}>{recording ? '🔴' : '🎤'}</span>
      <span>{recording ? (lang === 'gu' ? 'સાંભળાય છે... (ટેપ ટુ સ્ટૉપ)' : 'Listening… tap to stop') : (lang === 'gu' ? 'અવાજથી લખો' : 'Speak your complaint')}</span>
    </button>
  );
}

/* ── FILE UPLOAD (real, with preview) ──────────────── */
function MediaUpload({ files, setFiles, lang }) {
  const photoRef = useRef(null);
  const videoRef = useRef(null);
  const docRef = useRef(null);

  const handleFiles = (fileList, kind) => {
    const arr = Array.from(fileList).slice(0, 5).map(f => {
      const url = URL.createObjectURL(f);
      return {
        kind, name: f.name, size: (f.size / 1024 / 1024).toFixed(2) + ' MB',
        url, type: f.type,
        quality: f.size < 8 * 1024 * 1024 ? '✅ Clear · accepted' : '⚠️ Large file — may take time'
      };
    });
    setFiles(prev => [...prev, ...arr]);
  };

  const remove = (i) => setFiles(prev => prev.filter((_, j) => j !== i));

  const Btn = ({ onClick, icon, label }) => (
    <button type="button" onClick={onClick} style={{
      flex: 1, background: CC.white, border: `2px dashed ${CC.gray300}`,
      borderRadius: 12, padding: '14px 6px', cursor: 'pointer', fontFamily: 'inherit', textAlign: 'center'
    }}>
      <div style={{ fontSize: 22, marginBottom: 4 }}>{icon}</div>
      <div style={{ fontSize: 11, fontWeight: 600, color: CC.gray700 }}>{label}</div>
    </button>
  );

  return (
    <div>
      <input ref={photoRef} type="file" accept="image/*" multiple style={{ display: 'none' }} onChange={e => handleFiles(e.target.files, 'photo')} />
      <input ref={videoRef} type="file" accept="video/*" multiple style={{ display: 'none' }} onChange={e => handleFiles(e.target.files, 'video')} />
      <input ref={docRef} type="file" accept=".pdf,.doc,.docx" multiple style={{ display: 'none' }} onChange={e => handleFiles(e.target.files, 'doc')} />
      <div style={{ display: 'flex', gap: 8, marginBottom: 12 }}>
        <Btn onClick={() => photoRef.current?.click()} icon="📷" label={lang === 'gu' ? 'ફોટો' : 'Photo'} />
        <Btn onClick={() => videoRef.current?.click()} icon="🎬" label={lang === 'gu' ? 'વિડિઓ' : 'Video'} />
        <Btn onClick={() => docRef.current?.click()} icon="📄" label={lang === 'gu' ? 'દસ્તાવેજ' : 'Document'} />
      </div>
      {files.length === 0 && (
        <div style={{ background: CC.gray50, borderRadius: 10, padding: '11px 14px', fontSize: 11, color: CC.gray500, textAlign: 'center' }}>
          {lang === 'gu' ? 'કોઈ ફાઇલ નથી — ઉમેરો' : 'No files yet · Photo/video/PDF helps faster resolution'}
        </div>
      )}
      {files.map((f, i) => (
        <div key={i} style={{ background: CC.white, borderRadius: 10, padding: '8px 10px', marginBottom: 6, display: 'flex', gap: 10, alignItems: 'center', boxShadow: '0 1px 3px rgba(0,0,0,0.05)' }}>
          {f.kind === 'photo' ? (
            <img src={f.url} alt="" style={{ width: 44, height: 44, borderRadius: 8, objectFit: 'cover', flexShrink: 0 }} />
          ) : (
            <div style={{ width: 44, height: 44, borderRadius: 8, background: CC.gray100, display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: 22, flexShrink: 0 }}>{f.kind === 'video' ? '🎬' : '📄'}</div>
          )}
          <div style={{ flex: 1, minWidth: 0 }}>
            <div style={{ fontSize: 12, fontWeight: 600, color: CC.gray800, whiteSpace: 'nowrap', overflow: 'hidden', textOverflow: 'ellipsis' }}>{f.name}</div>
            <div style={{ fontSize: 10, color: CC.gray400 }}>{f.size}</div>
            <div style={{ fontSize: 10, color: f.quality.startsWith('✅') ? CC.green : CC.amber, marginTop: 2 }}>{f.quality}</div>
          </div>
          <button onClick={() => remove(i)} style={{ background: 'none', border: 'none', cursor: 'pointer', fontSize: 14, color: CC.gray400 }}><Icon name="x" size={16} /></button>
        </div>
      ))}
    </div>
  );
}

/* ── LOCATION FETCHER ──────────────────────────────── */
function LocationPicker({ value, setValue, lang }) {
  const [fetching, setFetching] = useState(false);
  const [autoDetected, setAutoDetected] = useState(false);
  const districts = window.GMS.LOCATION_DATA.districts;
  const talukas = window.GMS.LOCATION_DATA.talukas[value.district] || [];
  const villages = window.GMS.LOCATION_DATA.villages[value.taluka] || [];

  const fetchGPS = () => {
    setFetching(true);
    if (!navigator.geolocation) {
      setTimeout(() => {
        setValue({ district: 'Ahmedabad', taluka: 'Daskroi', village: 'Naranpura Ward 12', area: 'Near PHC Naranpura, Ward 12', gps: '23.0480° N, 72.5479° E' });
        setAutoDetected(true);
        setFetching(false);
      }, 1100);
      return;
    }
    navigator.geolocation.getCurrentPosition(
      (pos) => {
        setValue({ district: 'Ahmedabad', taluka: 'Daskroi', village: 'Naranpura Ward 12',
          area: value.area || 'Auto-detected location',
          gps: `${pos.coords.latitude.toFixed(4)}° N, ${pos.coords.longitude.toFixed(4)}° E` });
        setAutoDetected(true);
        setFetching(false);
      },
      () => {
        setValue({ district: 'Ahmedabad', taluka: 'Daskroi', village: 'Naranpura Ward 12', area: 'Naranpura, near PHC', gps: '23.0480° N, 72.5479° E (approx)' });
        setAutoDetected(true);
        setFetching(false);
      },
      { timeout: 4000 }
    );
  };

  const setField = (k, v) => setValue({ ...value, [k]: v, ...(k === 'district' ? { taluka: '', village: '' } : k === 'taluka' ? { village: '' } : {}) });

  const Sel = ({ label, val, onChange, options, placeholder }) => (
    <div style={{ marginBottom: 12 }}>
      <div style={{ fontSize: 11, fontWeight: 600, color: CC.gray600, marginBottom: 5 }}>{label}</div>
      <select value={val} onChange={e => onChange(e.target.value)} style={{ width: '100%', padding: '11px 12px', borderRadius: 10, border: `1.5px solid ${CC.gray200}`, fontSize: 13, fontFamily: 'inherit', background: CC.white, color: val ? CC.gray800 : CC.gray400, outline: 'none' }}>
        <option value="">{placeholder}</option>
        {options.map(o => <option key={o} value={o}>{o}</option>)}
      </select>
    </div>
  );

  return (
    <div>
      <button type="button" onClick={fetchGPS} disabled={fetching} style={{
        width: '100%', display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 10,
        padding: '11px 14px', borderRadius: 10, border: `1.5px solid ${CC.teal}`,
        background: CC.tealLight, color: CC.teal, fontFamily: 'inherit', fontSize: 12, fontWeight: 700,
        cursor: 'pointer', marginBottom: 12, opacity: fetching ? 0.6 : 1
      }}>
        <span>{fetching ? '⏳' : '📍'}</span>
        <span>{fetching ? (lang === 'gu' ? 'સ્થળ શોધી રહ્યા છીએ...' : 'Detecting your location...') : (lang === 'gu' ? 'GPS થી સ્થળ મેળવો' : 'Detect my location via GPS')}</span>
      </button>

      {autoDetected && value.gps && (
        <div style={{ background: CC.greenLight, border: `1px solid ${CC.green}33`, borderRadius: 10, padding: '8px 12px', fontSize: 11, color: CC.green, marginBottom: 12, fontWeight: 600 }}>
          ✓ {lang === 'gu' ? 'સ્થળ મળ્યું' : 'Location detected'}: {value.gps}
        </div>
      )}

      <Sel label={lang === 'gu' ? 'જિલ્લો' : 'District *'} val={value.district} onChange={v => setField('district', v)} options={districts} placeholder={lang === 'gu' ? 'જિલ્લો પસંદ કરો' : 'Select district'} />
      <Sel label={lang === 'gu' ? 'તાલુકો' : 'Taluka *'} val={value.taluka} onChange={v => setField('taluka', v)} options={talukas} placeholder={value.district ? (lang === 'gu' ? 'તાલુકો પસંદ કરો' : 'Select taluka') : 'First select district'} />
      <Sel label={lang === 'gu' ? 'ગામ / વોર્ડ' : 'Village / Ward'} val={value.village} onChange={v => setField('village', v)} options={villages} placeholder={value.taluka ? (lang === 'gu' ? 'ગામ/વોર્ડ પસંદ કરો' : 'Select village/ward') : 'First select taluka'} />

      <div style={{ marginBottom: 4 }}>
        <div style={{ fontSize: 11, fontWeight: 600, color: CC.gray600, marginBottom: 5 }}>{lang === 'gu' ? 'ચોક્કસ સરનામું / સ્થળ' : 'Specific area / landmark'}</div>
        <input value={value.area} onChange={e => setValue({ ...value, area: e.target.value })} placeholder={lang === 'gu' ? 'દા.ત. PHC નારણપુરા પાસે' : 'e.g. Near PHC Naranpura, opposite ward office'} style={{ width: '100%', padding: '11px 12px', borderRadius: 10, border: `1.5px solid ${CC.gray200}`, fontSize: 13, fontFamily: 'inherit', outline: 'none', color: CC.gray800 }} />
      </div>
    </div>
  );
}

<script type="text/babel">// Swagat 3.0 — AI Coach Panel + Scheme Suggestions (mobile + web)
const { useState: useS_AC, useEffect: useE_AC, useMemo: useM_AC } = React;
const Cac = window.GMS.COLORS;

// AI analysis hook — runs all 8 AI features over current submit data
window.GMS.useAIAnalysis = function(data) {
  return useM_AC(() => {
    const desc = (data.description || '').toLowerCase();
    const cat = data.subCategory || data.category;
    const domain = data.domain;

    // 1. Missing-Details Coach
    const coach = window.GMS.AI_COACH;
    const missing = coach.required.filter(k => !coach.prompts[k].regex.test(desc));
    const completeness = Math.round(((coach.required.length - missing.length) / coach.required.length) * 100);

    // 2. Severity Classifier
    const sev = window.GMS.AI_SEVERITY;
    let severity = cat?.priority || 'MEDIUM';
    let sevReason = 'Based on category default';
    if (sev.critical.some(k => desc.includes(k))) { severity = 'CRITICAL'; sevReason = 'Detected critical keywords (emergency/denial/outbreak)'; }
    else if (sev.high.some(k => desc.includes(k))) { severity = 'HIGH'; sevReason = 'Detected high-impact keywords'; }

    // 3. Sentiment / urgency
    const sentiment = window.GMS.AI_SENTIMENT_TRIGGERS.some(t => desc.includes(t));

    // 4. Department routing
    const routing = cat ? {
      unit: cat.unit || (domain?.code === 'HEALTH' ? 'CDHO Office' : domain?.code === 'WATER' ? 'GWSSB / ULB' : domain?.code === 'ROADS' ? 'R&B Division' : domain?.code === 'URBAN' ? 'Municipal Corporation' : 'Agri Dept'),
      officer: domain?.code === 'HEALTH' ? 'CDHO ' + (data.district || 'District') : 'Designated Officer',
      level: 'Level 1 — Field officer',
    } : null;

    // 5. Resolution prediction
    const dKey = domain?.code?.toLowerCase() === 'roads' ? 'roads' : domain?.code?.toLowerCase();
    const avgDays = window.GMS.AI_RESOLUTION_AVG[dKey]?.[severity.toLowerCase()] || 5.5;

    // 6. Scheme matcher
    const schemeIds = window.GMS.SCHEME_MATCHER[cat?.code] || [];
    const matchedSchemes = schemeIds.map(id => window.GMS.SCHEMES.find(s => s.id === id)).filter(Boolean);

    return { missing, completeness, severity, sevReason, sentiment, routing, avgDays, matchedSchemes };
  }, [data.description, data.subCategory, data.domain, data.district]);
};

// + Floating AI Assistant chatbot widget (web bottom-left + mobile)
// All labels bilingual EN / ગુજરાતી

const { useState, useEffect, useRef, useMemo } = React;
const PCC = window.GMS.COLORS;

/* ── Bilingual label helper: always shows EN / GU ─────────────────── */
function BL({ en, gu, sub }) {
  return (
    <span style={{ display: 'inline-flex', flexDirection: 'column', lineHeight: 1.15 }}>
      <span>{en}</span>
      {gu && <span style={{ fontSize: sub ? 10 : '0.78em', opacity: 0.7, fontWeight: 500 }}>{gu}</span>}

/* ── Bilingual block label (above input) ──────────────────────────── */
function FieldLabel({ en, gu, required }) {

    <div style={{ marginBottom: 6 }}>
      <span style={{ fontSize: 12, fontWeight: 700, color: PCC.gray700 }}>
        {en}{required && <span style={{ color: PCC.red, marginLeft: 2 }}>*</span>}
        <span style={{ color: PCC.gray400, fontWeight: 500 }}> / </span>
        <span style={{ fontWeight: 600, color: PCC.gray600 }}>{gu}</span>
      </span>
    </div>
  );
}

/* ── Voice recorder (Web Speech API + simulated fallback) ─────────── */
function P1VoiceMic({ onTranscript }) {
  const [recording, setRecording] = useState(false);
  const [supported, setSupported] = useState(true);
  const recogRef = useRef(null);

  const start = () => {
    const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (!SR) {
      setSupported(false);
      setRecording(true);
      setTimeout(() => {
        onTranscript('Garbage has not been collected from our street for 5 days. Bins are overflowing near the school. Please send the cleanup vehicle. — અમારી શેરીમાંથી 5 દિવસથી કચરો ઉપાડાયો નથી.');
        setRecording(false);
      }, 2400);
      return;
    }
    const r = new SR();
    r.lang = 'en-IN';
    r.interimResults = true;
    r.continuous = false;
    let finalText = '';
    r.onresult = (e) => {
      finalText = Array.from(e.results).map(res => res[0].transcript).join(' ');
    };
    r.onend = () => { setRecording(false); if (finalText) onTranscript(finalText); };
    r.onerror = () => setRecording(false);
    recogRef.current = r;
    try { r.start(); setRecording(true); } catch(e) { setRecording(false); }
  };
  const stop = () => { recogRef.current?.stop(); setRecording(false); };

  return (
    <button type="button" onClick={recording ? stop : start} style={{
      display: 'inline-flex', alignItems: 'center', gap: 8, padding: '9px 14px',
      borderRadius: 10, border: `1.5px solid ${recording ? PCC.red : PCC.purple}`,
      background: recording ? PCC.redLight : PCC.purpleLight,
      color: recording ? PCC.red : PCC.purple,
      cursor: 'pointer', fontFamily: 'inherit', fontSize: 12, fontWeight: 700,
    }}>
      <span style={{ width: 8, height: 8, borderRadius: '50%', background: recording ? PCC.red : PCC.purple, animation: recording ? 'p1pulse 1s infinite' : 'none' }} />
      <BL en={recording ? 'Listening… tap to stop' : 'Speak your complaint'} gu={recording ? 'સાંભળી રહ્યા છીએ… રોકવા ટૅપ કરો' : 'તમારી ફરિયાદ બોલો'} />
    </button>
  );
}

/* ── 5-Step Phase 1 Submit Flow (works for mobile + web) ──────────── */
function Phase1Submit({ onDone, isWeb }) {
  const [step, setStep] = useState(1);
  const [category, setCategory] = useState(null);
  const [subCat, setSubCat] = useState(null);
  const [title, setTitle] = useState('');
  const [description, setDescription] = useState('');
  const [loc, setLoc] = useState({ district: '', taluka: '', ward: '', specific: '', gps: '' });
  const [detecting, setDetecting] = useState(false);
  const [autoDetected, setAutoDetected] = useState(false);
  const [submitted, setSubmitted] = useState(null);

  const domains = window.GMS.DOMAINS;
  const LOC = window.GMS.LOCATION_DATA;
  const talukas = LOC.talukas[loc.district] || [];
  const wards = LOC.villages[loc.taluka] || [];

  /* ─ GPS detection ─ */
  const detectLocation = () => {
    setDetecting(true);
    const finish = (data) => {
      setLoc(prev => ({ ...prev, ...data }));
      setAutoDetected(true);
      setDetecting(false);
    };
    if (!navigator.geolocation) {
      setTimeout(() => finish({ district: 'Ahmedabad', taluka: 'Daskroi', ward: 'Naranpura Ward 12', specific: prev => prev || 'Near PHC Naranpura', gps: '23.0480° N, 72.5479° E' }), 1400);
      return;
    }
    navigator.geolocation.getCurrentPosition(
      (pos) => finish({ district: 'Ahmedabad', taluka: 'Daskroi', ward: 'Naranpura Ward 12', gps: `${pos.coords.latitude.toFixed(4)}° N, ${pos.coords.longitude.toFixed(4)}° E` }),
      () => finish({ district: 'Ahmedabad', taluka: 'Daskroi', ward: 'Naranpura Ward 12', gps: '23.0480° N, 72.5479° E (approx)' }),
      { timeout: 5000 }
    );
  };

  /* ─ submit ─ */
  const submit = () => {
    const tok = `GJ-2026-${Math.floor(900 + Math.random() * 99)}`;
    setSubmitted({
      token: tok, ts: new Date().toLocaleString('en-IN'),
      category, subCat, title, description, location: loc,
    });
  };

  const setLocField = (k, v) => setLoc(prev => ({
    ...prev, [k]: v,
    ...(k === 'district' ? { taluka: '', ward: '' } : k === 'taluka' ? { ward: '' } : {})
  }));

  /* ─ validation ─ */
  const canStep2 = !!category;
  const canStep3 = !!subCat;
  const canStep4 = title.trim().length >= 5 && description.trim().length >= 20 && loc.district && loc.taluka;

  if (submitted) return <Phase1Success data={submitted} isWeb={isWeb} onDone={onDone} />;

  /* ─ wrappers ─ */
  const wrapStyle = isWeb
    ? { background: PCC.white, borderRadius: 16, padding: '22px 26px', boxShadow: '0 2px 8px rgba(0,0,0,0.06)', maxWidth: 820, margin: '0 auto' }
    : { height: '100%', display: 'flex', flexDirection: 'column', background: PCC.gray50 };

  const stepLabels = [
    { en: 'Category', gu: 'શ્રેણી' },
    { en: 'Sub-category', gu: 'પેટા-શ્રેણી' },
    { en: 'Issue details', gu: 'સમસ્યા વિગતો' },
    { en: 'Review & submit', gu: 'સમીક્ષા અને સબમિટ' },
    { en: 'Filed!', gu: 'સફળ!' },
  ];

  return (
    <div style={wrapStyle}>
      {/* HEADER */}
      <div style={isWeb ? {} : { padding: '14px 16px 8px', flexShrink: 0, background: PCC.white, borderBottom: `1px solid ${PCC.gray100}` }}>
        <div style={{ fontSize: isWeb ? 18 : 16, fontWeight: 800, color: PCC.gray800, lineHeight: 1.25 }}>
          File a New Grievance
          <div style={{ fontSize: 13, fontWeight: 600, color: PCC.gray500, marginTop: 2 }}>નવી ફરિયાદ નોંધાવો</div>
        </div>

        {/* Stepper */}
        <div style={{ display: 'flex', alignItems: 'center', gap: isWeb ? 6 : 4, marginTop: 14, marginBottom: 14, overflowX: 'auto' }}>
          {[1,2,3,4,5].map(i => (
            <React.Fragment key={i}>
              <div style={{
                display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 4, flexShrink: 0
              }}>
                <div style={{
                  width: 26, height: 26, borderRadius: '50%',
                  background: i < step ? PCC.green : i === step ? PCC.saffron : PCC.gray200,
                  color: i <= step ? PCC.white : PCC.gray500,
                  display: 'flex', alignItems: 'center', justifyContent: 'center',
                  fontSize: 11, fontWeight: 800, transition: 'all 0.2s'
                }}>{i < step ? '✓' : i}</div>
                {isWeb && (
                  <div style={{ fontSize: 9, fontWeight: 700, color: i === step ? PCC.saffron : PCC.gray500, textAlign: 'center', lineHeight: 1.2 }}>
                    <div>{stepLabels[i-1].en}</div>
                    <div style={{ opacity: 0.7 }}>{stepLabels[i-1].gu}</div>
                  </div>
                )}
              </div>
              {i < 5 && <div style={{ flex: 1, minWidth: 12, height: 2, background: i < step ? PCC.green : PCC.gray200 }} />}
            </React.Fragment>
          ))}
        </div>
      </div>

      <div style={isWeb ? { paddingTop: 4 } : { flex: 1, overflowY: 'auto', padding: '14px 16px 8px' }}>

        {/* ============ STEP 1: CATEGORY ============ */}
        {step === 1 && (
          <div>
            <div style={{ fontSize: 14, fontWeight: 800, color: PCC.gray800, marginBottom: 2 }}>
              Choose Category
            </div>
            <div style={{ fontSize: 12, color: PCC.gray500, marginBottom: 14 }}>શ્રેણી પસંદ કરો</div>
            <div style={{ display: 'grid', gridTemplateColumns: isWeb ? 'repeat(5, 1fr)' : '1fr 1fr', gap: 10 }}>
              {domains.map(d => (
                <button key={d.code} onClick={() => { setCategory(d); setSubCat(null); }} style={{
                  padding: isWeb ? '16px 12px' : '14px 10px',
                  borderRadius: 12, cursor: 'pointer', fontFamily: 'inherit', textAlign: 'center',
                  border: `2px solid ${category?.code === d.code ? d.color : PCC.gray200}`,
                  background: category?.code === d.code ? `${d.color}11` : PCC.white,
                  transition: 'all 0.15s',
                  boxShadow: category?.code === d.code ? `0 2px 10px ${d.color}33` : 'none',
                }}>
                  <div style={{ fontSize: 28, marginBottom: 6 }}>{d.iconName ? <Icon name={d.iconName} size={20} /> : null}</div>
                  <div style={{ fontSize: isWeb ? 12 : 11, fontWeight: 800, color: PCC.gray800, lineHeight: 1.25 }}>{d.label}</div>
                  <div style={{ fontSize: isWeb ? 11 : 10, color: PCC.gray600, fontWeight: 600, marginTop: 3 }}>{d.labelGu}</div>
                </button>
              ))}
            </div>
            {category && (
              <div style={{ marginTop: 14, background: `${category.color}0d`, borderLeft: `3px solid ${category.color}`, borderRadius: 8, padding: '10px 14px', fontSize: 12, color: PCC.gray700, lineHeight: 1.5 }}>
                <strong style={{ color: category.color }}>{category.label} / {category.labelGu}</strong> — {category.desc}
              </div>
            )}
          </div>
        )}

        {/* ============ STEP 2: SUB-CATEGORY ============ */}
        {step === 2 && category && (
          <div>
            <div style={{ fontSize: 14, fontWeight: 800, color: PCC.gray800, marginBottom: 2 }}>Choose Sub-category</div>
            <div style={{ fontSize: 12, color: PCC.gray500, marginBottom: 4 }}>પેટા-શ્રેણી પસંદ કરો</div>
            <div style={{ fontSize: 11, color: category.color, fontWeight: 700, marginBottom: 14 }}>
              {category.iconName ? <Icon name={category.iconName} size={20} /> : null} {category.label} / {category.labelGu}
            </div>
            <div style={{ display: 'grid', gridTemplateColumns: isWeb ? 'repeat(2, 1fr)' : '1fr', gap: 8 }}>
              {category.subs.map(sc => (
                <button key={sc.code} onClick={() => setSubCat(sc)} style={{
                  padding: '12px 14px', borderRadius: 10, cursor: 'pointer', fontFamily: 'inherit', textAlign: 'left',
                  border: `1.5px solid ${subCat?.code === sc.code ? category.color : PCC.gray200}`,
                  background: subCat?.code === sc.code ? `${category.color}0d` : PCC.white,
                  display: 'flex', alignItems: 'center', gap: 12,
                }}>
                  <span style={{ fontSize: 22, flexShrink: 0 }}>{sc.iconName ? <Icon name={sc.iconName} size={20} /> : null}</span>
                  <div style={{ flex: 1, minWidth: 0 }}>
                    <div style={{ fontSize: 13, fontWeight: 700, color: PCC.gray800, lineHeight: 1.3 }}>{sc.label}</div>
                    <div style={{ fontSize: 11, color: PCC.gray600, fontWeight: 600, marginTop: 1 }}>{sc.labelGu}</div>
                    <div style={{ fontSize: 10, color: PCC.gray500, marginTop: 4 }}>
                      <span style={{ color: sc.priority === 'CRITICAL' ? PCC.red : sc.priority === 'HIGH' ? PCC.amber : PCC.gray500, fontWeight: 700 }}>{sc.priority}</span>
                      {' · '}SLA: {sc.sla} {sc.sla === 1 ? 'day' : 'days'} / {sc.sla} દિવસ
                    </div>
                  </div>
                </button>
              ))}
            </div>
          </div>
        )}

        {/* ============ STEP 3: ISSUE DETAILS ============ */}
        {step === 3 && (
          <div>
            <div style={{ fontSize: 14, fontWeight: 800, color: PCC.gray800, marginBottom: 2 }}>Issue Details</div>
            <div style={{ fontSize: 12, color: PCC.gray500, marginBottom: 14 }}>સમસ્યાની વિગતો</div>

            {/* 3.1 Title */}
            <div style={{ marginBottom: 14 }}>
              <FieldLabel en="Grievance Title" gu="ફરિયાદનું શીર્ષક" required />
              <input value={title} onChange={e => setTitle(e.target.value)} maxLength={80}
                placeholder="Short, descriptive title / ટૂંકું વર્ણનાત્મક શીર્ષક"
                style={p1Input} />
              <div style={{ fontSize: 10, color: PCC.gray400, textAlign: 'right', marginTop: 3 }}>{title.length}/80</div>
            </div>

            {/* 3.2 Describe + Voice */}
            <div style={{ marginBottom: 14 }}>
              <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-end', flexWrap: 'wrap', gap: 8, marginBottom: 6 }}>
                <FieldLabel en="Describe the Issue" gu="ફરિયાદનું વર્ણન" required />
                <P1VoiceMic onTranscript={(t) => setDescription(prev => (prev ? prev + ' ' + t : t).trim())} />
              </div>
              <textarea value={description} onChange={e => setDescription(e.target.value)} rows={isWeb ? 5 : 4}
                placeholder="Describe what happened, when, where, who was involved... / શું થયું, ક્યારે, ક્યાં, કોણ સામેલ — સ્પષ્ટ રીતે જણાવો"
                style={{ ...p1Input, resize: 'vertical', lineHeight: 1.5 }} />
              <div style={{ display: 'flex', justifyContent: 'space-between', marginTop: 4 }}>
                <span style={{ fontSize: 10, color: description.length < 20 ? PCC.amber : PCC.green, fontWeight: 600 }}>
                  {description.length < 20 ? `${20 - description.length} more chars needed / હજુ ${20 - description.length} અક્ષર જરૂરી` : '✓ Looks good / સારું'}
                </span>
                <span style={{ fontSize: 10, color: PCC.gray400 }}>{description.length}/500</span>
              </div>
            </div>

            {/* 3.3 Location auto-detect */}
            <div style={{ background: PCC.gray50, borderRadius: 12, padding: 14, marginBottom: 6 }}>
              <FieldLabel en="Location" gu="સ્થળ" required />
              <button type="button" onClick={detectLocation} disabled={detecting} style={{
                width: '100%', display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 10,
                padding: '11px 14px', borderRadius: 10, border: `1.5px solid ${autoDetected ? PCC.green : PCC.teal}`,
                background: autoDetected ? PCC.greenLight : PCC.tealLight,
                color: autoDetected ? PCC.green : PCC.teal,
                fontFamily: 'inherit', fontSize: 12, fontWeight: 700,
                cursor: 'pointer', marginBottom: 12, opacity: detecting ? 0.7 : 1
              }}>
                <span style={{ fontSize: 16 }}>{detecting ? '⏳' : autoDetected ? '✓' : '📍'}</span>
                <BL
                  en={detecting ? 'Detecting location…' : autoDetected ? 'Location detected — autofilled below' : 'Detect my location (GPS)'}
                  gu={detecting ? 'સ્થળ શોધી રહ્યા છીએ…' : autoDetected ? 'સ્થળ મળ્યું — નીચે ભરાઈ ગયું' : 'મારું સ્થળ શોધો (GPS)'}
                />
              </button>
              {autoDetected && loc.gps && (
                <div style={{ fontSize: 11, color: PCC.green, fontWeight: 600, marginBottom: 12, textAlign: 'center' }}>GPS: {loc.gps}</div>
              )}

              {/* Manual location fields */}
              <div style={{ display: 'grid', gridTemplateColumns: isWeb ? '1fr 1fr' : '1fr', gap: 10 }}>
                <div>
                  <FieldLabel en="District" gu="જિલ્લો" required />
                  <select value={loc.district} onChange={e => setLocField('district', e.target.value)} style={p1Select}>
                    <option value="">— Select / પસંદ કરો —</option>
                    {LOC.districts.map(d => <option key={d} value={d}>{d}</option>)}
                  </select>
                </div>
                <div>
                  <FieldLabel en="Taluka" gu="તાલુકો" required />
                  <select value={loc.taluka} onChange={e => setLocField('taluka', e.target.value)} disabled={!loc.district} style={{ ...p1Select, opacity: loc.district ? 1 : 0.5 }}>
                    <option value="">{loc.district ? '— Select / પસંદ કરો —' : '— First select district —'}</option>
                    {talukas.map(t => <option key={t} value={t}>{t}</option>)}
                  </select>
                </div>
                <div>
                  <FieldLabel en="Ward / Village" gu="વોર્ડ / ગામ" />
                  <select value={loc.ward} onChange={e => setLocField('ward', e.target.value)} disabled={!loc.taluka} style={{ ...p1Select, opacity: loc.taluka ? 1 : 0.5 }}>
                    <option value="">{loc.taluka ? '— Select / પસંદ કરો —' : '— First select taluka —'}</option>
                    {wards.map(w => <option key={w} value={w}>{w}</option>)}
                  </select>
                </div>
                <div>
                  <FieldLabel en="Specific Location" gu="ચોક્કસ સ્થળ" />
                  <input value={loc.specific} onChange={e => setLocField('specific', e.target.value)}
                    placeholder="Landmark / address / સીમાચિહ્ન / સરનામું"
                    style={p1Input} />
                </div>
              </div>
            </div>
          </div>
        )}

        {/* ============ STEP 4: REVIEW ============ */}
        {step === 4 && (
          <div>
            <div style={{ fontSize: 14, fontWeight: 800, color: PCC.gray800, marginBottom: 2 }}>Review & Submit</div>
            <div style={{ fontSize: 12, color: PCC.gray500, marginBottom: 14 }}>સમીક્ષા અને સબમિટ</div>

            <div style={{ background: PCC.gray50, border: `2px dashed ${PCC.gray300}`, borderRadius: 14, padding: '14px 16px', marginBottom: 14 }}>
              <div style={{ fontSize: 10, fontWeight: 800, color: PCC.gray500, letterSpacing: 0.6, marginBottom: 10 }}><Icon name="document" size={14} /> DRAFT PREVIEW / ડ્રાફ્ટ પૂર્વાવલોકન</div>

              {/* Tags */}
              <div style={{ display: 'flex', gap: 6, flexWrap: 'wrap', marginBottom: 10 }}>
                <span style={{ background: category.color + '15', color: category.color, padding: '4px 10px', borderRadius: 12, fontSize: 11, fontWeight: 700 }}>{category.iconName ? <Icon name={category.iconName} size={20} /> : null} {category.label} / {category.labelGu}</span>
                <span style={{ background: PCC.gray200, color: PCC.gray700, padding: '4px 10px', borderRadius: 12, fontSize: 11, fontWeight: 700 }}>{subCat.label} / {subCat.labelGu}</span>
                <span style={{ background: subCat.priority === 'CRITICAL' ? PCC.redLight : PCC.amberLight, color: subCat.priority === 'CRITICAL' ? PCC.red : PCC.amber, padding: '4px 10px', borderRadius: 12, fontSize: 11, fontWeight: 700 }}>{subCat.priority} · SLA {subCat.sla}d</span>
              </div>

              {/* Title */}
              <div style={{ fontSize: 10, fontWeight: 700, color: PCC.gray500, letterSpacing: 0.4, marginTop: 10 }}>TITLE / શીર્ષક</div>
              <div style={{ fontSize: 14, fontWeight: 700, color: PCC.gray800, marginBottom: 8 }}>{title}</div>

              {/* Description */}
              <div style={{ fontSize: 10, fontWeight: 700, color: PCC.gray500, letterSpacing: 0.4 }}>DESCRIPTION / વર્ણન</div>
              <div style={{ fontSize: 12, color: PCC.gray700, lineHeight: 1.5, marginBottom: 10, whiteSpace: 'pre-wrap' }}>{description}</div>

              {/* Location */}
              <div style={{ fontSize: 10, fontWeight: 700, color: PCC.gray500, letterSpacing: 0.4 }}>LOCATION / સ્થળ</div>
              <div style={{ fontSize: 12, color: PCC.gray700, marginBottom: 4 }}>
                📍 {[loc.specific, loc.ward, loc.taluka, loc.district].filter(Boolean).join(', ')}
              </div>
              {loc.gps && <div style={{ fontSize: 10, color: PCC.gray500 }}>GPS: {loc.gps}</div>}
            </div>

            <div style={{ background: PCC.saffronLight, borderRadius: 10, padding: '11px 14px', fontSize: 11, color: PCC.gray700, lineHeight: 1.6 }}>
              ✓ On submit, you'll get a token number and SMS confirmation<br/>
              <span style={{ color: PCC.gray600 }}><Icon name="check" size={14} /> સબમિટ થયા પછી ટોકન નંબર મળશે અને SMS જશે</span>
            </div>
          </div>
        )}
      </div>

      {/* FOOTER NAV */}
      <div style={isWeb
        ? { display: 'flex', gap: 10, marginTop: 18, paddingTop: 14, borderTop: `1px solid ${PCC.gray100}` }
        : { padding: '12px 16px 18px', flexShrink: 0, borderTop: `1px solid ${PCC.gray100}`, background: PCC.white, display: 'flex', gap: 8 }
      }>
        {step > 1 && (
          <button onClick={() => setStep(s => s - 1)} style={p1BtnBack}>
            ← <BL en="Back" gu="પાછળ" />
          </button>
        )}
        {step < 4 && (
          <button disabled={(step === 1 && !canStep2) || (step === 2 && !canStep3)} onClick={() => setStep(s => s + 1)}
            style={{ ...p1BtnNext, opacity: ((step === 1 && !canStep2) || (step === 2 && !canStep3)) ? 0.4 : 1 }}>
            <BL en="Next" gu="આગળ" /> →
          </button>
        )}
        {step === 3 && (
          <button disabled={!canStep4} onClick={() => setStep(4)}
            style={{ ...p1BtnNext, opacity: canStep4 ? 1 : 0.4 }}>
            <BL en="Review" gu="સમીક્ષા" /> →
          </button>
        )}
        {step === 4 && (
          <button onClick={submit} style={{ ...p1BtnNext, background: PCC.green }}>
            ✓ <BL en="Submit Grievance" gu="ફરિયાદ સબમિટ કરો" />
          </button>
        )}
      </div>
    </div>
  );
}

/* ── Step 5: Filed Successfully ──────────────────────────────────── */
function Phase1Success({ data, isWeb, onDone }) {
  const wrap = isWeb
    ? { background: PCC.white, borderRadius: 16, boxShadow: '0 6px 28px rgba(0,0,0,0.1)', maxWidth: 640, margin: '20px auto', overflow: 'hidden' }
    : { height: '100%', display: 'flex', flexDirection: 'column', background: PCC.gray50, overflow: 'hidden' };

  return (
    <div style={wrap}>
      {/* Hero */}
      <div style={{ background: 'linear-gradient(135deg, #16A34A, #059669)', color: PCC.white, padding: '32px 22px 26px', textAlign: 'center', position: 'relative', overflow: 'hidden' }}>
        <div style={{ position: 'absolute', inset: 0, background: 'radial-gradient(circle at 30% 20%, rgba(255,255,255,0.2), transparent 60%)' }} />
        <div style={{ width: 76, height: 76, borderRadius: '50%', background: 'rgba(255,255,255,0.2)', margin: '0 auto 12px', display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: 40, position: 'relative' }}><Icon name="check" size={16} /></div>
        <div style={{ fontSize: 22, fontWeight: 800, position: 'relative' }}>Filed Successfully!</div>
        <div style={{ fontSize: 14, fontWeight: 600, opacity: 0.9, position: 'relative', marginTop: 2 }}>સફળતાપૂર્વક નોંધાયું!</div>
        <div style={{ fontSize: 11, opacity: 0.8, marginTop: 8, position: 'relative' }}>Your grievance has been registered with the system</div>
        <div style={{ fontSize: 11, opacity: 0.7, position: 'relative' }}>તમારી ફરિયાદ સ્વીકારવામાં આવી છે</div>
      </div>

      <div style={{ flex: 1, overflowY: 'auto', padding: '20px 22px' }}>
        {/* Token */}
        <div style={{ background: 'linear-gradient(135deg, #FFF3E8, #FED7AA)', border: `2px dashed ${PCC.saffron}`, borderRadius: 14, padding: '14px 20px', textAlign: 'center', marginBottom: 16 }}>
          <div style={{ fontSize: 10, fontWeight: 700, color: PCC.gray500, letterSpacing: 1, marginBottom: 4 }}>TOKEN NUMBER / ટોકન નંબર</div>
          <div style={{ fontSize: 28, fontWeight: 900, color: PCC.navy, letterSpacing: 1.5, fontFamily: 'monospace' }}>{data.token}</div>
          <div style={{ fontSize: 10, color: PCC.gray500, marginTop: 4 }}>{data.ts}</div>
        </div>

        {/* Pills */}
        <div style={{ display: 'grid', gridTemplateColumns: 'repeat(3, 1fr)', gap: 8, marginBottom: 16 }}>
          {[
            { en: 'Status', gu: 'સ્થિતિ', v: 'OPEN', c: PCC.navy },
            { en: 'Priority', gu: 'પ્રાથમિકતા', v: data.subCat.priority, c: data.subCat.priority === 'CRITICAL' ? PCC.red : PCC.amber },
            { en: 'SLA', gu: 'સમય મર્યાદા', v: `${data.subCat.sla}d`, c: PCC.green },
          ].map(p => (
            <div key={p.en} style={{ background: p.c + '13', borderRadius: 10, padding: '10px 8px', textAlign: 'center', border: `1px solid ${p.c}33` }}>
              <div style={{ fontSize: 9, fontWeight: 700, color: PCC.gray500, letterSpacing: 0.4, marginBottom: 2 }}>{p.en.toUpperCase()} / {p.gu}</div>
              <div style={{ fontSize: 13, fontWeight: 800, color: p.c }}>{p.v}</div>
            </div>
          ))}
        </div>

        {/* Details */}
        <div style={{ background: PCC.gray50, borderRadius: 12, overflow: 'hidden', marginBottom: 16 }}>
          {[
            ['Category / શ્રેણી', `${data.category.icon} ${data.category.label} / ${data.category.labelGu}`],
            ['Sub-category / પેટા-શ્રેણી', `${data.subCat.label} / ${data.subCat.labelGu}`],
            ['Title / શીર્ષક', data.title],
            ['District / જિલ્લો', data.location.district],
            ['Taluka / તાલુકો', data.location.taluka],
            ['Ward / Village / વોર્ડ / ગામ', data.location.ward || '—'],
            ['Specific Location / ચોક્કસ સ્થળ', data.location.specific || '—'],
            ...(data.location.gps ? [['GPS', data.location.gps]] : []),
          ].map(([k, v], i, a) => (
            <div key={k} style={{ display: 'flex', justifyContent: 'space-between', gap: 12, padding: '9px 14px', borderBottom: i < a.length - 1 ? `1px solid ${PCC.gray200}` : 'none' }}>
              <span style={{ fontSize: 11, color: PCC.gray500, flexShrink: 0 }}>{k}</span>
              <span style={{ fontSize: 11, fontWeight: 600, color: PCC.gray800, textAlign: 'right' }}>{v}</span>
            </div>
          ))}
        </div>

        {/* Next steps */}

      SUBMIT_1: 'SUBMIT_1', WHATSAPP: 'WHATSAPP', CHATBOT: 'CHATBOT',
      CLUSTERS: 'CLUSTERS', SCHEMES: 'SCHEMES',
    };
    setHistory([]);
    setScreen(map[key] || key);
  };

  const advanceSubmit = (stepData, nextScreen) => {
    setSubmitData(prev => ({ ...prev, ...stepData }));
    go(nextScreen);
  };

  const screens = {
    SPLASH: <SplashScreen onDone={() => go('LANGUAGE', false)} />,
    LANGUAGE: <LanguageScreen onSelect={(l) => { setLang(l); go('LOGIN', false); }} />,
    LOGIN: <LoginScreen onOtp={(m) => { setMobile(m); go('OTP'); }} lang={lang} onRegister={() => go('REGISTER')} />,
    REGISTER: <RegistrationScreen lang={lang} onBack={goBack} onDone={() => go('DASHBOARD', false)} isWeb={false} />,
    OTP: <OTPScreen mobile={mobile} onVerify={() => go('DASHBOARD', false)} onBack={goBack} lang={lang} />,
    DASHBOARD: <DashboardScreen lang={lang} onNav={handleNav} onGrievance={(g) => { setActiveGrievance(g); go('TRACK'); }} />,
    GRIEVANCES: <GrievanceListScreen lang={lang} onBack={goBack} onGrievance={(g) => { setActiveGrievance(g); go('TRACK'); }} onNav={handleNav} />,
    TRACK: activeGrievance ? <TrackScreen g={activeGrievance} lang={lang} onBack={goBack} onFeedback={() => go('FEEDBACK')} onReopen={() => go('REOPEN')} /> : null,
    NOTIFICATIONS: <NotificationsScreen lang={lang} onBack={goBack} onTap={(n) => { const g = window.GMS.GRIEVANCES.find(gr => gr.id === n.grievanceId); if (g) { setActiveGrievance(g); go('TRACK'); } else goBack(); }} />,
    PROFILE: <ProfileScreen lang={lang} onBack={goBack} onLang={() => go('LANGUAGE')} />,
    SUBMIT_1: <Phase1Submit isWeb={false} onDone={() => { setHistory([]); setScreen('GRIEVANCES'); }} />,
    SUBMIT_2: <Phase1Submit isWeb={false} onDone={() => { setHistory([]); setScreen('GRIEVANCES'); }} />,
    SUBMIT_3: <Phase1Submit isWeb={false} onDone={() => { setHistory([]); setScreen('GRIEVANCES'); }} />,
    SUBMIT_4: <Phase1Submit isWeb={false} onDone={() => { setHistory([]); setScreen('GRIEVANCES'); }} />,
    SUBMIT_5: <Phase1Submit isWeb={false} onDone={() => { setHistory([]); setScreen('GRIEVANCES'); }} />,
    CONFIRM: <Phase1Submit isWeb={false} onDone={() => { setHistory([]); setScreen('GRIEVANCES'); }} />,
    FEEDBACK: activeGrievance ? <FeedbackScreen lang={lang} grievance={activeGrievance} onBack={goBack} onDone={() => { setHistory([]); setScreen('DASHBOARD'); }} /> : null,
    REOPEN: activeGrievance ? <ReopenScreen lang={lang} grievance={activeGrievance} onBack={goBack} onDone={() => { setHistory([]); setScreen('DASHBOARD'); }} /> : null,
    WHATSAPP: <WhatsAppScreen lang={lang} onBack={goBack} />,
    CHATBOT: <ChatbotScreen lang={lang} onBack={goBack} />,
    CLUSTERS: <ClustersScreen lang={lang} onBack={goBack} isWeb={false} />,
    SCHEMES: <window.GMS.SchemesPage lang={lang} isWeb={false} onBack={goBack} />,
  };

  return (
    <div style={{ height: '100%', position: 'relative', overflow: 'hidden', background: C.gray50 }}>
      {screens[screen] || <DashboardScreen lang={lang} onNav={handleNav} onGrievance={(g) => { setActiveGrievance(g); go('TRACK'); }} />}
      {!['SPLASH','LANGUAGE','LOGIN','OTP','REGISTER'].includes(screen) && <AIChatbotWidget isWeb={false} />}
    </div>
  );
}

/* ── WEB REGISTER (matches WebLogin split layout) ─────── */
function WebRegister({ lang, onBack, onDone }) {
  const [step, setStep] = useState(0);
  const [data, setData] = useState({ ...window.GMS.REGISTRATION_DEFAULTS, language: lang });
  const [otp, setOtp] = useState('');
  const [loading, setLoading] = useState(false);
  const set = (k, v) => setData(d => ({ ...d, [k]: v }));

  const stepTitles = ['Mobile Verification', 'Personal Info', 'Address', 'Review & Confirm'];
  const stepSubs = [
    'Verify your number with OTP — same login works on mobile + web',
    'Tell us a bit about yourself',
    'Your address helps route grievances faster',
    'Confirm your details and create your account',

  const canNext =
    step === 0 ? (data.fullName && data.mobile.replace(/\s/g,'').length >= 10 && data.otp && otp.length === 6) :

              <div style={{ fontWeight: 800, fontSize: 18 }}>Swagat 3.0</div>
              <div style={{ fontSize: 10, opacity: 0.6, letterSpacing: '0.6px' }}>HEALTH & FAMILY WELFARE · GUJARAT</div>
            </div>
          </div>

        <div style={{ position: 'relative' }}>

          <div style={{ display: 'flex', flexDirection: 'column', gap: 10, maxWidth: 380 }}>
            {stepTitles.map((t, i) => (
              <div key={t} style={{ display: 'flex', alignItems: 'center', gap: 12, padding: '10px 14px', borderRadius: 10, background: i === step ? 'rgba(255,255,255,0.14)' : 'rgba(255,255,255,0.04)', backdropFilter: 'blur(8px)', border: i === step ? `1px solid ${C.saffron}66` : '1px solid rgba(255,255,255,0.06)', transition: 'all 0.2s' }}>
                <div style={{ width: 26, height: 26, borderRadius: '50%', background: i < step ? C.green : i === step ? C.saffron : 'rgba(255,255,255,0.12)', color: C.white, display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: 12, fontWeight: 700, flexShrink: 0 }}>
                  {i < step ? '✓' : i + 1}
                </div>
                <div style={{ fontSize: 12, fontWeight: i === step ? 700 : 500, opacity: i === step ? 1 : 0.7 }}>{t}</div>
              </div>
            ))}
          </div>
        </div>
        <div style={{ position: 'relative', fontSize: 10, opacity: 0.5 }}>🔒 Encrypted · Aadhaar optional · You can update details anytime</div>

          {step === 2 && (
            <>
              <div style={{ marginBottom: 14 }}>
                <div style={{ fontSize: 12, fontWeight: 600, color: C.gray600, marginBottom: 6 }}>District</div>
                <select value={data.district} onChange={e => set('district', e.target.value)} style={{ width: '100%', padding: '13px 14px', borderRadius: 12, border: `2px solid ${C.gray200}`, fontSize: 14, fontFamily: 'inherit', background: C.white, color: C.gray800, outline: 'none' }}>
                  {window.GMS.DISTRICTS.map(d => <option key={d} value={d}>{d}</option>)}
                </select>
              </div>
              <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 12 }}>
                <Field label="Taluka" value={data.taluka} onChange={v => set('taluka', v)} placeholder="e.g. Daskroi" />

            <>

                  <div key={k} style={{ display: 'flex', justifyContent: 'space-between', padding: '11px 16px', borderBottom: i < 7 ? `1px solid ${C.gray100}` : 'none' }}>
                    <span style={{ fontSize: 12, color: C.gray400 }}>{k}</span>
                    <span style={{ fontSize: 13, fontWeight: 600, color: C.gray800 }}>{v}</span>
                  </div>
                ))}
              </div>
              <label style={{ display: 'flex', alignItems: 'flex-start', gap: 10, marginTop: 14, padding: '12px 14px', background: C.gray100, borderRadius: 12, cursor: 'pointer' }}>
                <input type="checkbox" checked={data.consent} onChange={e => set('consent', e.target.checked)} style={{ marginTop: 2 }} />
                <span style={{ fontSize: 12, color: C.gray600, lineHeight: 1.4 }}>I agree to share my information with HFWD Gujarat for grievance redressal. Data is governed by DPDP Act 2023.</span>

            </>

          <div style={{ display: 'flex', gap: 10, marginTop: 22 }}>
            <button onClick={back} style={{ padding: '13px 18px', borderRadius: 12, background: C.white, color: C.gray700, border: `2px solid ${C.gray200}`, fontWeight: 700, fontSize: 14, cursor: 'pointer', fontFamily: 'inherit' }}>← {step === 0 ? 'Back to Login' : 'Back'}</button>
            <button onClick={next} disabled={loading || !canNext} style={{ flex: 1, padding: '13px', borderRadius: 12, background: C.saffron, color: C.white, border: 'none', fontWeight: 700, fontSize: 14, cursor: canNext && !loading ? 'pointer' : 'not-allowed', fontFamily: 'inherit', opacity: canNext && !loading ? 1 : 0.5 }}>{loading ? '⏳ Creating account…' : step < 3 ? 'Next →' : '🎉 Create Account'}</button>
          </div>

          {step === 0 && (
            <div style={{ textAlign: 'center', marginTop: 18, fontSize: 12, color: C.gray500 }}>
              Already registered? <span onClick={onBack} style={{ color: C.navy, fontWeight: 700, cursor: 'pointer' }}>Sign in →</span>
            </div>
          )}
        </div>
      </div>
    </div>
  );
}

/* small reusable input that matches WebLogin styling */

      <div style={{ fontSize: 12, fontWeight: 600, color: C.gray600, marginBottom: 6 }}>{label}</div>

}
