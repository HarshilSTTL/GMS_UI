/* ── ACTION MODAL (works for all 5 actions) ─────────── */
function ActionModal({ action, g, lang, onClose }) {
  if (!action) return null;
  const [step, setStep] = useState(0);
  const [reason, setReason] = useState('');
  const [rating, setRating] = useState(0);
  const [comment, setComment] = useState('');

  const close = () => { setStep(0); setReason(''); setRating(0); setComment(''); onClose(); };

  const config = {
    reopen: {
      title: lang === 'gu' ? 'કેસ ફરી ખોલો' : 'Reopen Case',
      subtitle: 'Tell us why you are not satisfied with the resolution',
      successTitle: 'Case Reopened',
      successText: `Your reopen request for ${g.id} has been logged. The officer will review and respond within 48 hours. SMS confirmation sent.`,
      action: 'Reopen',
    },
    feedback: {
      title: lang === 'gu' ? 'પ્રતિસાદ આપો' : 'Provide Feedback',
      subtitle: 'Rate how the grievance was handled',
      successTitle: 'Feedback Submitted',
      successText: `Thank you! Your ${rating}-star rating helps us improve service quality. Your feedback has been routed to the supervising officer.`,
      action: 'Submit Feedback',
    },
    escalate: {
      title: lang === 'gu' ? 'ઉચ્ચાધિકારી ને મોકલો' : 'Escalate Grievance',
      subtitle: `Escalate ${g.id} to the next administrative level`,
      successTitle: 'Escalated Successfully',
      successText: `${g.id} has been escalated to Director Health Services (Dr. R.S. Mehta). New SLA: 48 hours. You'll receive priority updates.`,
      action: 'Confirm Escalation',
    },
    contact: {
      title: lang === 'gu' ? 'અધિકારીનો સંપર્ક કરો' : 'Contact Officer',
      subtitle: g.officer,
      successTitle: 'Connecting...',
      successText: '',
      action: 'Send Message',
    },
    download: {
      title: lang === 'gu' ? 'રિપોર્ટ ડાઉનલોડ કરો' : 'Download Report',
      subtitle: `Generate official PDF report for ${g.id}`,
      successTitle: 'Report Ready',
      successText: `Grievance_Report_${g.id}.pdf has been generated. Download starting...`,
      action: 'Generate PDF',
    },
  };

  const cfg = config[action];

  return (
    <div style={{ position: 'absolute', inset: 0, background: 'rgba(15,26,46,0.6)', display: 'flex', alignItems: 'center', justifyContent: 'center', zIndex: 50, animation: 'fadeInUp 0.18s' }} onClick={close}>
      <div onClick={e => e.stopPropagation()} style={{ background: C.white, borderRadius: 16, padding: '24px 26px', maxWidth: 480, width: '90%', boxShadow: '0 20px 50px rgba(0,0,0,0.3)' }}>
        <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start', marginBottom: 18 }}>
          <div>
            <div style={{ fontSize: 18, fontWeight: 800, color: C.gray800 }}>{cfg.title}</div>
            <div style={{ fontSize: 12, color: C.gray500, marginTop: 4 }}>{cfg.subtitle}</div>
          </div>
          <button onClick={close} style={{ background: 'none', border: 'none', cursor: 'pointer', color: C.gray400, padding: 4, display: 'flex', alignItems: 'center' }}><Icon name="x" size={18} /></button>
        </div>

        {step === 0 && (
          <>
            {action === 'reopen' && (
              <>
                <div style={{ background: C.saffronLight, borderRadius: 10, padding: '10px 12px', fontSize: 11, color: C.gray700, marginBottom: 14 }}><Icon name="alert" size={14} /> Reopening will reset the SLA timer and reassign to the original officer.
                </div>
                <textarea value={reason} onChange={e => setReason(e.target.value)} placeholder="Why are you reopening this case? (e.g. The medicine was provided once but issue continues, staff is not following SOP...)" rows={4} style={{ width: '100%', padding: '11px 13px', borderRadius: 10, border: `2px solid ${C.gray200}`, fontSize: 13, fontFamily: 'inherit', outline: 'none', resize: 'vertical', color: C.gray800, marginBottom: 14, lineHeight: 1.5 }} />
              </>
            )}
            {action === 'feedback' && (
              <>
                <div style={{ display: 'flex', justifyContent: 'center', gap: 10, marginBottom: 14 }}>
                  {[1,2,3,4,5].map(n => (
                    <button key={n} onClick={() => setRating(n)} style={{ background: 'none', border: 'none', cursor: 'pointer', padding: 0, display: 'flex', alignItems: 'center' }}><Icon name="star" size={38} color={rating >= n ? '#FBBF24' : C.gray200} fill={rating >= n ? '#FBBF24' : 'none'} /></button>
                  ))}
                </div>
                <div style={{ textAlign: 'center', fontSize: 13, fontWeight: 600, color: rating ? C.gray800 : C.gray400, marginBottom: 14 }}>{rating ? ['','Very Poor','Poor','Average','Good','Excellent'][rating] : 'Tap a star to rate'}</div>
                <textarea value={comment} onChange={e => setComment(e.target.value)} placeholder="Additional comments (optional)" rows={3} style={{ width: '100%', padding: '11px 13px', borderRadius: 10, border: `2px solid ${C.gray200}`, fontSize: 13, fontFamily: 'inherit', outline: 'none', resize: 'vertical', color: C.gray800, marginBottom: 14 }} />
              </>
            )}
            {action === 'escalate' && (
              <>
                <div style={{ background: '#FEF3C7', borderRadius: 10, padding: '10px 12px', fontSize: 11, color: C.gray700, marginBottom: 14, lineHeight: 1.5 }}><Icon name="alert" size={14} /> Escalating moves your case to <strong>Director Health Services</strong>. The current officer ({g.officer}) will be marked as non-responsive. Use this only if SLA is breached.
                </div>
                <div style={{ marginBottom: 14 }}>
                  <div style={{ fontSize: 12, fontWeight: 600, color: C.gray700, marginBottom: 6 }}>Reason for escalation</div>
                  <select value={reason} onChange={e => setReason(e.target.value)} style={{ width: '100%', padding: '10px 12px', borderRadius: 10, border: `2px solid ${C.gray200}`, fontSize: 13, fontFamily: 'inherit', outline: 'none', color: C.gray800, background: C.white }}>
                    <option value="">Select a reason...</option>
                    <option>SLA breached — no response</option>
                    <option>Officer denied service</option>
                    <option>Issue continues despite "resolved" status</option>
                    <option>Corruption / misconduct suspected</option>
                    <option>Other</option>
                  </select>
                </div>
              </>
            )}
            {action === 'contact' && (
              <>
                <div style={{ background: C.gray50, borderRadius: 10, padding: '12px 14px', marginBottom: 14 }}>
                  <div style={{ fontSize: 11, color: C.gray500 }}>Officer</div>
                  <div style={{ fontSize: 14, fontWeight: 700, color: C.gray800 }}>{g.officer}</div>
                  <div style={{ fontSize: 11, color: C.gray500, marginTop: 6 }}>+91 79 2657 8800 ext. 234 · cdho-ahmedabad@gujhealth.gov.in</div>
                </div>
                <textarea value={comment} onChange={e => setComment(e.target.value)} placeholder="Type your message to the officer..." rows={4} style={{ width: '100%', padding: '11px 13px', borderRadius: 10, border: `2px solid ${C.gray200}`, fontSize: 13, fontFamily: 'inherit', outline: 'none', resize: 'vertical', color: C.gray800, marginBottom: 14 }} />
              </>
            )}
            {action === 'download' && (
              <>
                <div style={{ background: C.gray50, borderRadius: 10, padding: '14px 16px', marginBottom: 14 }}>
                  <div style={{ fontSize: 12, fontWeight: 600, color: C.gray700, marginBottom: 8 }}>Report includes:</div>
                  {['Grievance details & status timeline','Officer notes and actions','Supporting evidence (photos/docs)','SLA tracking & escalation history','Citizen Charter compliance section'].map(it => (
                    <div key={it} style={{ fontSize: 11, color: C.gray600, padding: '3px 0', display: 'flex', alignItems: 'center', gap: 6 }}><Icon name="check" size={12} color={C.green} /> {it}</div>
                  ))}
                </div>
              </>
            )}

            <div style={{ display: 'flex', gap: 10 }}>
              <button onClick={close} style={{ flex: 0, padding: '11px 18px', borderRadius: 10, background: C.gray100, color: C.gray700, border: 'none', fontWeight: 600, fontSize: 13, cursor: 'pointer', fontFamily: 'inherit' }}>Cancel</button>
              <button onClick={() => setStep(1)} disabled={(action === 'reopen' && !reason) || (action === 'feedback' && !rating) || (action === 'escalate' && !reason) || (action === 'contact' && !comment)} style={{ flex: 1, padding: '11px', borderRadius: 10, background: C.saffron, color: C.white, border: 'none', fontWeight: 700, fontSize: 13, cursor: 'pointer', fontFamily: 'inherit', opacity: ((action === 'reopen' && !reason) || (action === 'feedback' && !rating) || (action === 'escalate' && !reason) || (action === 'contact' && !comment)) ? 0.4 : 1 }}>{cfg.action}</button>
            </div>
          </>
        )}

        {step === 1 && (
          <div style={{ textAlign: 'center', padding: '12px 0' }}>
            <div style={{ marginBottom: 12, display: 'flex', justifyContent: 'center' }}><Icon name={action === 'feedback' ? 'trophy' : action === 'download' ? 'document' : action === 'contact' ? 'mail' : 'check'} size={56} color={C.saffron} /></div>
            <div style={{ fontSize: 18, fontWeight: 800, color: C.gray800, marginBottom: 8 }}>{cfg.successTitle}</div>
            <div style={{ fontSize: 12, color: C.gray600, lineHeight: 1.6, marginBottom: 18 }}>{action === 'contact' ? `Message sent to ${g.officer}. They typically respond within 24 hours via SMS or in-app.` : cfg.successText}</div>
            <button onClick={close} style={{ padding: '10px 28px', background: C.saffron, color: C.white, border: 'none', borderRadius: 10, fontWeight: 700, fontSize: 13, cursor: 'pointer', fontFamily: 'inherit' }}>Done</button>
          </div>
        )}
      </div>
    </div>
  );
}

function WebGrievanceList({ lang, grievances, filter, setFilter, onOpen, onSubmit }) {
  const [sortBy, setSortBy] = useState('id');
  const [sortDir, setSortDir] = useState('asc');
  
  const sortedGrievances = useMemo(() => {
    const sorted = [...grievances].sort((a, b) => {
      let aVal = a[sortBy === 'id' ? 'id' : sortBy === 'date' ? 'submittedDate' : sortBy === 'dept' ? 'officer' : sortBy === 'status' ? 'status' : sortBy === 'time' ? 'slaDaysLeft' : 'priority'];
      let bVal = b[sortBy === 'id' ? 'id' : sortBy === 'date' ? 'submittedDate' : sortBy === 'dept' ? 'officer' : sortBy === 'status' ? 'status' : sortBy === 'time' ? 'slaDaysLeft' : 'priority'];
      if (typeof aVal === 'string') aVal = aVal.toLowerCase();
      if (typeof bVal === 'string') bVal = bVal.toLowerCase();
      if (aVal < bVal) return sortDir === 'asc' ? -1 : 1;
      if (aVal > bVal) return sortDir === 'asc' ? 1 : -1;
      return 0;
    });
    return sorted;
  }, [grievances, sortBy, sortDir]);
  
  const handleSort = (column) => {
    if (sortBy === column) {
      setSortDir(sortDir === 'asc' ? 'desc' : 'asc');
    } else {
      setSortBy(column);
      setSortDir('asc');
    }
  };
  
  return (
    <div style={{ background: C.white, borderRadius: 16, boxShadow: '0 2px 8px rgba(0,0,0,0.06)', overflow: 'hidden' }}>
      <div style={{ padding: '14px 20px', borderBottom: `1px solid ${C.gray100}`, display: 'flex', justifyContent: 'space-between', alignItems: 'center', flexWrap: 'wrap', gap: 10 }}>
        <div style={{ fontWeight: 700, fontSize: 14, color: C.gray800 }}>Grievance Registry · {grievances.length} records</div>
        <div style={{ display: 'flex', gap: 6 }}>
          {[
            { k: 'all', l: 'All' },
            { k: 'active', l: 'Active' },
            { k: 'escalated', l: 'Escalated' },
            { k: 'resolved', l: 'Resolved' },
          ].map(f => (
            <button key={f.k} onClick={() => setFilter(f.k)} style={{ padding: '5px 12px', borderRadius: 14, background: filter === f.k ? C.navy : C.gray100, color: filter === f.k ? C.white : C.gray600, border: 'none', fontSize: 11, fontWeight: 600, cursor: 'pointer', fontFamily: 'inherit' }}>{f.l}</button>
          ))}
          <button onClick={onSubmit} style={{ padding: '5px 14px', borderRadius: 14, background: C.saffron, border: 'none', color: C.white, fontWeight: 700, fontSize: 11, cursor: 'pointer', fontFamily: 'inherit', marginLeft: 6 }}>+ New</button>
        </div>
      </div>
      <div style={{ overflowX: 'auto' }}>
        <table style={{ width: '100%', borderCollapse: 'collapse' }}>
          <thead>
            <tr style={{ background: C.gray50 }}>
              {[
                { k: 'id', l: 'Grievance ID' },
                { k: 'category', l: 'Category' },
                { k: 'location', l: 'Location' },
                { k: 'status', l: 'Status' },
                { k: 'priority', l: 'Priority' },
                { k: 'time', l: 'Est. Time' },
                { k: 'date', l: 'Filed' },
              ].map(h => (
                <th key={h.k} onClick={() => handleSort(h.k)} style={{ padding: '10px 16px', textAlign: 'left', fontSize: 11, fontWeight: 700, color: C.gray500, letterSpacing: '0.5px', textTransform: 'uppercase', whiteSpace: 'nowrap', cursor: 'pointer', userSelect: 'none', background: sortBy === h.k ? C.gray100 : C.gray50 }}>
                  {h.l} {sortBy === h.k && (sortDir === 'asc' ? '▲' : '▼')}
                </th>
              ))}
            </tr>
          </thead>
          <tbody>
            {sortedGrievances.map(g => (
              <tr key={g.id} onClick={() => onOpen(g)} style={{ borderTop: `1px solid ${C.gray100}`, cursor: 'pointer' }}
                onMouseEnter={e => e.currentTarget.style.background = C.gray50}
                onMouseLeave={e => e.currentTarget.style.background = 'transparent'}>
                <td style={{ padding: '11px 16px', fontSize: 12, fontWeight: 700, color: C.navy }}>{g.id}</td>
                <td style={{ padding: '11px 16px', fontSize: 12, color: C.gray700, maxWidth: 160, whiteSpace: 'nowrap', overflow: 'hidden', textOverflow: 'ellipsis' }}>{lang === 'gu' ? g.categoryGu : g.category}</td>
                <td style={{ padding: '11px 16px', fontSize: 11, color: C.gray500, maxWidth: 140, whiteSpace: 'nowrap', overflow: 'hidden', textOverflow: 'ellipsis' }}>{g.location}</td>
                <td style={{ padding: '11px 16px' }}><window.GMS.UI.StatusBadge status={g.status} lang={lang} /></td>
                <td style={{ padding: '11px 16px' }}><window.GMS.UI.PriorityBadge priority={g.priority} lang={lang} /></td>
                <td style={{ padding: '11px 16px' }}>
                  <div style={{ display: 'flex', alignItems: 'center', gap: 6 }}>
                    <div style={{ width: 50, height: 5, borderRadius: 3, background: C.gray200, overflow: 'hidden' }}>
                      <div style={{ height: '100%', borderRadius: 3, background: g.slaDaysLeft <= 0 ? C.red : g.slaDaysLeft <= 2 ? C.amber : C.green, width: `${Math.max(10, (g.slaDaysLeft/g.slaTotal)*100)}%` }} />

                    <span style={{ fontSize: 11, color: C.gray500, whiteSpace: 'nowrap' }}>{g.slaDaysLeft <= 0 ? 'Breached' : `${g.slaDaysLeft}d`}</span>

                <td style={{ padding: '11px 16px', fontSize: 11, color: C.gray400 }}>{g.submittedDate}</td>

            ))}

        </table>

  );

/* ── WEB CONTAINER (handles auth state) ──────── */
function WebContainer({ lang }) {
  const [stage, setStage] = useState('login'); // login | register | app

  if (stage === 'register') {
    return <WebRegister lang={lang} onBack={() => setStage('login')} onDone={() => setStage('app')} />;
  }

  if (stage === 'login') return <WebLogin lang={lang} onLogin={() => setStage('app')} onRegister={() => setStage('register')} />;

  return <WebPortalView lang={lang} onLogout={() => setStage('login')} />;
}
