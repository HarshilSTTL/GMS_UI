<script type="text/babel">
const { useState, useEffect } = React;

const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "adminRole": "SUPER",
  "viewMode": "web",
  "lang": "en",
  "darkMode": false,
  "showAI": true
}/*EDITMODE-END*/;

const NAV_LABELS = {
  dashboard: 'Dashboard', users: 'User Management', roles: 'Roles & Permissions',
  hierarchy: 'Hierarchy Builder', categories: 'Categories', sla: 'SLA Rule Engine',
  workflow: 'Workflow Configuration', escalation: 'Escalation Matrix', notif: 'Notifications',
  ai: 'AI Configuration', master: 'Master Data', audit: 'Audit Logs',
};

function App() {
  const [tweaks, setTweak] = useTweaks(TWEAK_DEFAULTS);
  const [active, setActive] = useState('dashboard');
  const [toast, setToast] = useState('');
  const [search, setSearch] = useState('');

  const role = window.GMS.ADMIN_ROLES.find(r => r.id === tweaks.adminRole) || window.GMS.ADMIN_ROLES[0];
  const showAI = tweaks.showAI;

  const addToast = (msg) => { setToast(msg); setTimeout(() => setToast(''), 2400); };

  const renderModule = () => {
    const props = { role, addToast, showAI, onNav: setActive, lang: tweaks.lang };
    switch (active) {
      case 'dashboard': return <AdminDashboard {...props} />;
      case 'users': return <AdminUsers {...props} />;
      case 'roles': return <AdminRoles {...props} />;
      case 'hierarchy': return <AdminHierarchy {...props} />;
      case 'categories': return <AdminCategories {...props} />;
      case 'sla': return <AdminSLA {...props} />;
      case 'workflow': return <AdminWorkflow {...props} />;
      case 'escalation': return <AdminEscalation {...props} />;
      case 'notif': return <AdminNotif {...props} />;
      case 'ai': return <AdminAI {...props} />;
      case 'master': return <AdminMaster {...props} />;
      case 'schemes': return <AdminSchemes {...props} />;
      case 'audit': return <AdminAudit {...props} />;
      default: return <AdminDashboard {...props} />;
    }
  };

  // Mobile view
  if (tweaks.viewMode === 'mobile') {
    return (
      <div style={{ minHeight: '100vh', display: 'flex', alignItems: 'center', justifyContent: 'center', background: 'radial-gradient(circle at 30% 30%, #1A3260, #0F1A2E)', padding: 30 }}>
        <div data-screen-label="Mobile Admin">
          <AndroidFrame>
            <AdminMobile role={role} addToast={addToast} showAI={showAI} lang={tweaks.lang} />
          </AndroidFrame>
        </div>
        <Toast msg={toast} />
        <TweaksUI tweaks={tweaks} setTweak={setTweak} />
      </div>
    );
  }

  // Both view (split-screen)
  if (tweaks.viewMode === 'both') {
    return (
      <div style={{ minHeight: '100vh', display: 'grid', gridTemplateColumns: '1fr 380px', background: '#0F1A2E' }}>
        <div style={{ display: 'flex', height: '100vh', overflow: 'hidden' }} data-screen-label="Web Admin">
          <AdminSidebar active={active} setActive={setActive} role={role} />
          <div style={{ flex: 1, display: 'flex', flexDirection: 'column', overflow: 'hidden', background: '#F4F2EE' }}>
            <AdminTopbar role={role} breadcrumbs={['Admin', NAV_LABELS[active]]} lang={tweaks.lang} onSearch={setSearch} />
            <main style={{ flex: 1, overflow: 'auto', padding: 22 }}>{renderModule()}</main>
          </div>
        </div>
        <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'center', padding: 22 }} data-screen-label="Mobile Admin">
          <div style={{ transform: 'scale(0.78)', transformOrigin: 'center' }}>
            <AndroidFrame>
              <AdminMobile role={role} addToast={addToast} showAI={showAI} lang={tweaks.lang} />
            </AndroidFrame>
          </div>
        </div>
        <Toast msg={toast} />
        <TweaksUI tweaks={tweaks} setTweak={setTweak} />
      </div>
    );
  }

  // Web view (default)
  return (
    <div style={{ display: 'flex', height: '100vh', overflow: 'hidden' }} className={tweaks.darkMode ? 'darkmode' : ''} data-screen-label="Web Admin">
      <AdminSidebar active={active} setActive={setActive} role={role} />
      <div style={{ flex: 1, display: 'flex', flexDirection: 'column', overflow: 'hidden', background: tweaks.darkMode ? '#0F1A2E' : '#F4F2EE' }}>
        <AdminTopbar role={role} breadcrumbs={['Admin', NAV_LABELS[active]]} lang={tweaks.lang} onSearch={setSearch} />
        <main style={{ flex: 1, overflow: 'auto', padding: 22 }}>{renderModule()}</main>
      </div>
      <Toast msg={toast} />
      <TweaksUI tweaks={tweaks} setTweak={setTweak} />
    </div>
  );
}

function TweaksUI({ tweaks, setTweak }) {
  return (
    <TweaksPanel title="Phase 3 Tweaks">
      <TweakSection title="Admin Role">
        <TweakSelect value={tweaks.adminRole} onChange={v => setTweak('adminRole', v)} options={window.GMS.ADMIN_ROLES.map(r => ({ value: r.id, label: r.name + ' · ' + r.scopeName }))} />
      </TweakSection>
      <TweakSection title="View Mode">
        <TweakRadio value={tweaks.viewMode} onChange={v => setTweak('viewMode', v)} options={[{ value: 'web', label: 'Web' }, { value: 'mobile', label: 'Mobile' }, { value: 'both', label: 'Both' }]} />
      </TweakSection>
      <TweakSection title="Language">
        <TweakRadio value={tweaks.lang} onChange={v => setTweak('lang', v)} options={[{ value: 'en', label: 'EN' }, { value: 'gu', label: 'ગુ' }, { value: 'hi', label: 'हि' }]} />
      </TweakSection>
      <TweakSection title="Display">
        <TweakToggle label="Dark Mode" value={tweaks.darkMode} onChange={v => setTweak('darkMode', v)} />
        <TweakToggle label="AI Insights & Suggestions" value={tweaks.showAI} onChange={v => setTweak('showAI', v)} />
      </TweakSection>
    </TweaksPanel>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
